/* คาร์ดิโอ — อัพรูปผลจากนาฬิกา/แอป ให้ AI อ่าน */
function openCardioPhoto(){
  showSheet(`
    <div class="handle"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div>
        <div class="sheetTitle">อัพรูปผล workout</div>
        <div class="sheetSub">${fmtDate(state.date)} · AI อ่านทุกกิจกรรม เวลา และแคลอรี่ที่เผาผลาญ จากรูป</div>
      </div>
      <button id="close-cdp" style="margin-left:auto;background:var(--bg3);border:1px solid var(--border);border-radius:50%;width:32px;height:32px;font-size:18px;color:var(--text2);cursor:pointer;flex-shrink:0">×</button>
    </div>
    <div id="cdp-photo"></div>
    <div id="cdp-form" style="display:none">
      <div class="warn" style="margin-bottom:12px">⚠️ ตรวจสอบค่าก่อนบันทึก — แก้ไข/เพิ่ม/ลบได้</div>
      <div id="cdp-items"></div>
      <button class="btn btn-ghost btn-block" id="cdp-add" style="margin-bottom:12px">➕ เพิ่มกิจกรรม</button>
      <div class="card" style="padding:13px;margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;font-size:13px;font-weight:800">
          <span>🔥 เผาผลาญรวม</span>
          <span id="cdp-sum" style="color:var(--amber)">0 kcal</span>
        </div>
      </div>
      <div class="err" id="cdp-err" style="margin-bottom:8px"></div>
      <button class="btn-save" id="cdp-save">บันทึกทั้งหมด</button>
    </div>
  `);
  document.getElementById("close-cdp").onclick=closeSheet;
  let imgState={mime:null,b64:null};
  let cdpItems=[];
  const photoBox=document.getElementById("cdp-photo"),form=document.getElementById("cdp-form");

  function renderCdpItems(){
    const box=document.getElementById("cdp-items");
    box.innerHTML=cdpItems.map((it,i)=>`
      <div class="card" style="padding:12px;margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <span style="font-size:10px;font-weight:800;color:var(--accent2)">กิจกรรม ${i+1}</span>
          <button class="delbtn" data-cdpdel="${i}" style="width:24px;height:24px;font-size:14px">×</button>
        </div>
        <div style="margin-bottom:8px"><div class="flbl">กิจกรรม</div><input data-cdp="${i}" data-k="activity" value="${esc(it.activity)}" placeholder="เช่น วิ่ง / เวทเทรนนิ่ง"></div>
        <div class="row">
          <div class="field"><div class="flbl">ระยะเวลา</div><input data-cdp="${i}" data-k="duration" value="${esc(it.duration)}" placeholder="45 นาที"></div>
          <div class="field"><div class="flbl">เผาผลาญ (kcal)</div><input data-cdp="${i}" data-k="calories" type="number" inputmode="decimal" value="${it.calories||""}"></div>
        </div>
      </div>`).join("");
    box.querySelectorAll("[data-cdp]").forEach(inp=>inp.oninput=()=>{
      const i=+inp.dataset.cdp,k=inp.dataset.k;
      cdpItems[i][k]=k==="calories"?(+inp.value||0):inp.value;
      if(k==="calories"){const sum=cdpItems.reduce((a,it)=>a+(+it.calories||0),0);document.getElementById("cdp-sum").textContent=sum+" kcal";}
    });
    box.querySelectorAll("[data-cdpdel]").forEach(b=>b.onclick=()=>{cdpItems.splice(+b.dataset.cdpdel,1);if(!cdpItems.length)cdpItems=[{activity:"",duration:"",calories:0}];renderCdpItems();});
    const sum=cdpItems.reduce((a,it)=>a+(+it.calories||0),0);
    document.getElementById("cdp-sum").textContent=sum+" kcal";
  }

  renderImgPicker(photoBox,imgState,"ผล workout",async()=>{
    setErr("cdp-err","");const btn=document.getElementById("af-analyze");if(btn){btn.textContent="🔍 กำลังอ่าน...";btn.disabled=true;}
    try{
      const txt=await callClaude({max_tokens:800,
        system:"ตอบ JSON เท่านั้น ห้ามมีข้อความอื่น ห้ามใส่ markdown",
        messages:[{role:"user",content:[
        {type:"image",source:{type:"base64",media_type:imgState.mime,data:imgState.b64}},
        {type:"text",text:`อ่านผลออกกำลังกายทุกกิจกรรมจากรูป (เช่น Apple Watch / Strava / Fitbit / ลู่วิ่ง / แอปยิม) ถ้ามีหลายกิจกรรม (เช่น วิ่ง + เวท) ให้แยกทุกอันออกมา
ตอบ JSON เท่านั้น ค่าที่ไม่มีให้ null: {"items":[{"activity":"ชื่อกิจกรรม เช่น วิ่ง/เวทเทรนนิ่ง/ปั่นจักรยาน","duration":"เช่น 45 นาที","calories":0}]}`}
      ]}]});
      const r=extractJSON(txt);
      cdpItems=(r.items||[]).map(it=>({activity:it.activity||"",duration:it.duration||"",calories:Math.round(it.calories)||0}));
      if(!cdpItems.length)cdpItems=[{activity:"",duration:"",calories:0}];
      photoBox.style.display="none";form.style.display="block";
      renderCdpItems();
    }catch(e){setErr("cdp-err",aiError(e));if(btn){btn.textContent="🤖 วิเคราะห์ด้วย AI";btn.disabled=false;}}
  });

  document.getElementById("cdp-add").onclick=()=>{cdpItems.push({activity:"",duration:"",calories:0});renderCdpItems();};
  document.getElementById("cdp-save").onclick=()=>{
    const valid=cdpItems.filter(it=>it.activity.trim()&&it.calories>0);
    if(!valid.length){setErr("cdp-err","ต้องมีอย่างน้อย 1 กิจกรรมที่มีชื่อและแคลอรี่");return;}
    valid.forEach(it=>saveCardio({activity:it.activity.trim(),duration:it.duration.trim(),calories:it.calories}));
    closeSheet();render();toast(`✅ บันทึก ${valid.length} กิจกรรม (รวม ${valid.reduce((a,it)=>a+it.calories,0)} kcal)`);
  };
}

function saveCardio(item){
  const list=LS.get(K.cardio(state.date),[]);
  list.push({id:Date.now()+"c",...item,time:new Date().toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit"})});
  LS.set(K.cardio(state.date),list);
}

async function generatePlan(errId){
  const p=LS.get(K.profile,null);
  try{
    const txt=await callClaude({
      max_tokens:4000,
      system:"คุณคือผู้เชี่ยวชาญด้านการสร้างแผนออกกำลังกาย ตอบ JSON เท่านั้น ห้ามมีข้อความอื่น ห้ามใช้ markdown code block ห้ามเพิ่มความเห็น หรือคำอธิบาย เอาแค่ JSON object ที่เป็น valid JSON ตรวจสอบให้แน่ใจว่า days มี 7 element พอดี",
      messages:[{role:"user",content:`สร้างแผนออกกำลังกาย 7 วัน สำหรับ เพศ${p.gender==="male"?"ชาย":"หญิง"} อายุ${p.age}ปี เป้าหมาย${GOALS.find(g=>g.id===p.goal)?.label||"ลดไขมัน"}

หลักการสำคัญ (ต้องทำตาม):
- ผสมผสาน weights training กับ Zone 2 cardio เสมอ
- Zone 2 cardio (เดินชัน/เดินเร็ว/ปั่นจักรยานเบาๆ ที่ 60-70% max HR) ให้มี 2-3 วัน เป็นพื้นฐานสำคัญ
- Weights training ให้มี 2-3 วัน โดยแบ่ง muscle group ต่างกัน
- มีวันพัก 1-2 วัน
- สามารถรวม weights + zone 2 ในวันเดียวกันได้ (เช่น เวทเสร็จต่อด้วยเดินชัน 20-30 นาที)

ตอบ JSON object เท่านั้น (ไม่ต้อง markdown code block ไม่ต้องข้อความ):
{"days":[{"day":"วันที่ 1","focus":"หน้าอก/ไหล่ + Zone 2","exercises":[{"name":"Bench Press","sets":"4x10","muscle":"หน้าอก"},{"name":"เดินชัน Zone 2","sets":"20 นาที","muscle":"cardio"}]},{"day":"วันที่ 2","focus":"Zone 2 Cardio","exercises":[{"name":"เดินชัน Zone 2","sets":"45 นาที","muscle":"cardio"}]},{"day":"วันที่ 3","focus":"ขา + Zone 2","exercises":[{"name":"Squat","sets":"4x12","muscle":"ต้นขา"}]},{"day":"วันที่ 4","focus":"วันพัก","exercises":[]},{"day":"วันที่ 5","focus":"หลัง/แขน","exercises":[{"name":"Pull-up","sets":"3x8","muscle":"หลัง"}]},{"day":"วันที่ 6","focus":"Zone 2 Cardio","exercises":[{"name":"เดินชัน Zone 2","sets":"45 นาที","muscle":"cardio"}]},{"day":"วันที่ 7","focus":"วันพัก","exercises":[]}]}
ต้องมี days เป็น array ที่มี 7 object พอดี (วันที่ 1-7) ไม่มากไม่น้อย`}]
    });
    let r;
    try{
      r=extractJSON(txt);
    }catch(parseErr){
      console.error("Plan parse failed. Raw response:",txt);
      throw new Error("PARSE: AI ตอบกลับไม่ใช่ JSON ที่อ่านได้ — ขึ้นต้นว่า: "+String(txt).trim().slice(0,80));
    }
    if(!r||typeof r!=="object"){
      throw new Error("AI ไม่ส่ง JSON object — ลองใหม่ครับ");
    }
    if(!r.days||!Array.isArray(r.days)){
      throw new Error(`ไม่มี "days" array (ได้ ${typeof r.days}) — ลองใหม่`);
    }
    if(r.days.length!==7){
      throw new Error(`แผนไม่ครบ 7 วัน ได้ ${r.days.length} วัน — ลองใหม่`);
    }
    if(!r.days.every(d=>d&&Array.isArray(d.exercises))){
      throw new Error("บางวันไม่มี exercises array — ลองใหม่");
    }
    LS.set(K.plan,{days:r.days,createdAt:todayStr()});
    render();toast("✅ สร้างแผนสำเร็จ");
  }catch(e){setErr(errId,aiError(e));}
}

  const rows=[];
  for(let i=0;i<10;i++){const d=addDays(today,i);const o=LS.get(K.dcal(d),null);if(o&&typeof o.cal==="number")rows.push({date:d,cal:o.cal,note:o.note});}
  if(!rows.length)return"";
  const months=["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
  const fmt=ds=>{const dd=new Date(ds+"T00:00:00");return`${dd.getDate()} ${months[dd.getMonth()]}`;};
  return`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div class="lbl">🏦 เป้าแคลอรี่รายวัน (Calorie Banking)</div>
      <button class="delbtn" id="clear-banking" style="width:auto;padding:4px 10px;font-size:11px;border-radius:8px">ล้างทั้งหมด</button>
    </div>
    ${rows.map(r=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-top:1px solid var(--border)">
      <div><span style="font-size:13px;font-weight:600;color:var(--text)">${fmt(r.date)}</span>${r.note?`<span style="font-size:11px;color:var(--text3)"> · ${esc(r.note)}</span>`:""}</div>
      <span style="font-size:14px;font-weight:800;color:var(--accent2)">${r.cal} kcal</span>
    </div>`).join("")}
  </div>`;
}

function weeklySummaryCard(){
  const today=todayStr();
  let totalCal=0,totalBurn=0,daysFood=0,daysWorkout=0;
  for(let i=0;i<7;i++){
    const d=addDays(today,-i);
    const fl=LS.get(K.food(d),[]);if(fl.length){totalCal+=fl.reduce((a,f)=>a+f.cal,0);daysFood++;}
    const cl=LS.get(K.cardio(d),[]);totalBurn+=cl.reduce((a,c)=>a+(c.calories||0),0);
    const wl=LS.get(K.workout(d),[]);if(wl.length)daysWorkout++;
  }
  const avgCal=daysFood?Math.round(totalCal/daysFood):0;
  const body=LS.get(K.body,[]).sort((a,b)=>a.date<b.date?-1:1);
  const bodyWeek=body.filter(e=>e.date>=addDays(today,-7));
  const wChg=bodyWeek.length>=2?(bodyWeek[bodyWeek.length-1].weight-bodyWeek[0].weight).toFixed(1):null;
  const bfChg=bodyWeek.length>=2&&bodyWeek[0].bodyFat!=null&&bodyWeek[bodyWeek.length-1].bodyFat!=null?(bodyWeek[bodyWeek.length-1].bodyFat-bodyWeek[0].bodyFat).toFixed(1):null;
  const netDef=Math.round(totalCal-totalBurn);
  const p=LS.get(K.profile,null),t=computeTargets(p,latestBody());
  const avgVsTarget=avgCal&&t.cal?Math.round((avgCal-t.cal)/t.cal*100):null;
  if(!daysFood)return`<div class="card"><div class="lbl">📅 สรุป 7 วันล่าสุด</div><div class="hint" style="padding:16px 0 4px"><div class="hs">ยังไม่มีข้อมูล — บันทึกอาหารอย่างน้อย 1 วัน</div></div></div>`;
  return`<div class="card">
    <div class="lbl" style="margin-bottom:12px">📅 สรุป 7 วันล่าสุด</div>
    <div class="statrow" style="margin-bottom:10px">
      ${stat("เฉลี่ย/วัน",avgCal,"kcal",true)}
      ${stat("เผาผลาญรวม",totalBurn||"-","kcal")}
      ${stat("บันทึก",daysFood,"/7 วัน")}
      ${stat("ออกกำลัง",daysWorkout,"/7 วัน")}
    </div>
    ${avgVsTarget!=null?`<div style="font-size:13px;font-weight:700;margin-bottom:8px;color:${Math.abs(avgVsTarget)<=5?"var(--green)":avgVsTarget>5?"var(--red)":"var(--amber)"}">
      ${avgVsTarget<=0?"✅":"⚠️"} เฉลี่ย${avgVsTarget>0?"เกิน":"ต่ำกว่า"}เป้า ${Math.abs(avgVsTarget)}% (${avgCal} vs ${t.cal} kcal)
    </div>`:""}
    ${wChg!=null?`<div class="statrow" style="margin-top:8px">
      ${stat("น้ำหนัก",`${+wChg>=0?"+":""}${wChg}`,"kg สัปดาห์นี้",+wChg<0)}
      ${bfChg!=null?stat("ไขมัน",`${+bfChg>=0?"+":""}${bfChg}`,"%",+bfChg<0):""}
    </div>`:""}
  </div>`;
}

/* ════ PROGRESS TIMELINE ════ */
function progressTimelineCard(p){
  if(!p)return"";
  const body=LS.get(K.body,[]).sort((a,b)=>a.date<b.date?-1:1);
  if(body.length<2)return"";
  const f=body[0],l=body[body.length-1];
  const days=Math.max(1,(new Date(l.date)-new Date(f.date))/86400000);
  const wksElapsed=days/7;
  const rows=[];
  // weight timeline
  if(p.targetWeight&&l.weight&&f.weight){
    const ratePerWk=(l.weight-f.weight)/wksElapsed;
    const left=l.weight-p.targetWeight;
    if(ratePerWk<-0.01&&left>0){
      const wksLeft=Math.ceil(Math.abs(left/ratePerWk));
      const targetD=addDays(todayStr(),wksLeft*7);
      const d2=new Date(targetD+"T00:00:00");
      const months=["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
      rows.push({label:`น้ำหนัก ${p.targetWeight} kg`,date:`${d2.getDate()} ${months[d2.getMonth()]} ${d2.getFullYear()}`,weeks:wksLeft,rate:`${Math.abs(ratePerWk).toFixed(2)} kg/สัปดาห์`});
    }else if(left<=0){rows.push({label:`น้ำหนัก ${p.targetWeight} kg`,done:true});}
  }
  // bf timeline
  if(p.targetBf&&l.bodyFat!=null&&f.bodyFat!=null){
    const ratePerWk=(l.bodyFat-f.bodyFat)/wksElapsed;
    const left=l.bodyFat-p.targetBf;
    if(ratePerWk<-0.01&&left>0){
      const wksLeft=Math.ceil(Math.abs(left/ratePerWk));
      const targetD=addDays(todayStr(),wksLeft*7);
      const d2=new Date(targetD+"T00:00:00");
      const months=["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
      rows.push({label:`ไขมัน ${p.targetBf}%`,date:`${d2.getDate()} ${months[d2.getMonth()]} ${d2.getFullYear()}`,weeks:wksLeft,rate:`${Math.abs(ratePerWk).toFixed(2)}%/สัปดาห์`});
    }else if(left<=0){rows.push({label:`ไขมัน ${p.targetBf}%`,done:true});}
  }
  if(!rows.length)return"";
  return`<div class="card">
    <div class="lbl" style="margin-bottom:12px">🎯 คาดการณ์ถึงเป้าหมาย</div>
    <div class="small" style="margin-bottom:12px">คำนวณจากอัตราเฉลี่ยของคุณ (${body.length} ครั้งที่ชั่ง / ${Math.round(days)} วัน)</div>
    ${rows.map(r=>r.done?`
      <div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-top:1px solid var(--border)">
        <span style="font-size:18px">🏆</span>
        <div><div style="font-size:13px;font-weight:700;color:var(--green)">บรรลุเป้า ${r.label} แล้ว!</div></div>
      </div>`:`
      <div style="padding:10px 0;border-top:1px solid var(--border)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
          <span style="font-size:13px;font-weight:700;color:var(--text)">${r.label}</span>
          <span style="font-size:13px;font-weight:800;color:var(--accent2)">${r.date}</span>
        </div>
        <div style="font-size:11px;color:var(--text3)">อีก ${r.weeks} สัปดาห์ · ปัจจุบัน ${r.rate}</div>
      </div>`).join("")}
    <div class="note" style="margin-top:10px;font-size:11px">⚠️ การคาดการณ์อิงจากอัตราปัจจุบัน อาจเปลี่ยนแปลงตามพฤติกรรมจริง</div>
  </div>`;
}

function stat(l,v,u,hl){
  return`<div class="stat ${hl?"hl":""}"><div class="sl">${l}</div><div class="sv num">${v}</div><div class="su">${u}</div></div>`;
}

function bindMore(){
  document.getElementById("savekey").onclick=()=>{
    LS.set(K.key,document.getElementById("apikey").value.trim());
    render();toast("✅ บันทึก key แล้ว");
  };
  const tk=document.getElementById("testkey");
  if(tk)tk.onclick=async()=>{
    setErr2("key-msg","");tk.textContent="...";tk.disabled=true;
    try{
      await callClaude({max_tokens:10,messages:[{role:"user",content:"hi"}]});
      const el=document.getElementById("key-msg");if(el){el.textContent="✅ Key ใช้งานได้";el.className="success";}
    }catch(e){
      const el=document.getElementById("key-msg");if(el){el.textContent=aiError(e);el.className="err";}
    }
    tk.textContent="ทดสอบ";tk.disabled=false;
  };
  renderProfileForm(document.getElementById("pform"),LS.get(K.profile,null),"บันทึก",np=>{LS.set(K.profile,np);render();toast("✅ บันทึกแล้ว");});
  document.querySelectorAll("[data-favdel]").forEach(b=>b.onclick=()=>{
    const fv=LS.get(K.fav,[]);fv.splice(+b.dataset.favdel,1);LS.set(K.fav,fv);render();
  });
  const cb=document.getElementById("clear-banking");
  if(cb)cb.onclick=()=>{
    if(confirm("ล้างเป้าแคลอรี่รายวันทั้งหมด? (กลับไปใช้เป้าปกติทุกวัน)")){
      const today=todayStr();
      for(let i=0;i<40;i++){LS.del(K.dcal(addDays(today,i)));}
      render();toast("ล้างเป้าแคลอรี่รายวันแล้ว");
    }
  };
  document.getElementById("export").onclick=()=>{
    const dump={};for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k.startsWith("fl_"))dump[k]=localStorage.getItem(k);}
    const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify(dump,null,2)],{type:"application/json"}));
    a.download="fitlog-backup-"+todayStr()+".json";a.click();toast("✅ ส่งออกแล้ว");
  };
  document.getElementById("import").onclick=()=>document.getElementById("importfile").click();
  document.getElementById("importfile").onchange=e=>{
    const f=e.target.files[0];if(!f)return;const r=new FileReader();
    r.onload=ev=>{try{
      const d=JSON.parse(ev.target.result);
      if(!confirm("นำเข้าจะเขียนทับข้อมูลปัจจุบัน ยืนยัน?"))return;
      Object.keys(d).forEach(k=>{if(k.startsWith("fl_"))localStorage.setItem(k,d[k]);});
      render();toast("✅ นำเข้าสำเร็จ");
    }catch{toast("❌ ไฟล์ไม่ถูกต้อง");}};
    r.readAsText(f);
  };
}
function setErr2(id,msg){const e=document.getElementById(id);if(e){e.textContent=msg;e.className=msg.startsWith("✅")?"success":"err";}}

  showSheet(`
    <div class="handle"></div>
    <div class="chatwrap">
      <div class="chathead">
        <div class="avatar">💬</div>
        <div>
          <div style="font-weight:800;font-size:15px">เทรนเนอร์ AI</div>
          <div style="font-size:10px;color:var(--green);font-weight:700;letter-spacing:.3px">● เข้าถึงข้อมูลจริงของคุณ</div>

      </div>
      <div class="chatbody" id="chatbody">${coachMsgs.map((m,i)=>bubbleHTML(m,i)).join("")}</div>
      ${coachMsgs.length<=1?`<div class="quick" id="quickbtns">${quick.map(q=>`<button data-q="${esc(q)}">${q}</button>`).join("")}</div>`:""}
      <div class="chatinput">
        <input id="coach-input" placeholder="ถามเทรนเนอร์...">
        <button class="sendbtn" id="coach-send">➤</button>
      </div>
    </div>
  `,true);
  const body=document.getElementById("chatbody");body.scrollTop=body.scrollHeight;
  document.getElementById("coach-close").onclick=closeSheet;
  document.querySelectorAll("[data-q]").forEach(b=>b.onclick=()=>coachSend(b.dataset.q));
  document.querySelectorAll("[data-saveplan]").forEach(b=>b.onclick=()=>{
    const m=coachMsgs[+b.dataset.saveplan];
    if(m&&m.plan&&m.plan.days){
      const existing=LS.get(K.plan,null);
      if(m.plan.partial&&existing&&existing.days&&existing.days.length===7){
        // ปรับเฉพาะบางวัน — รักษาวันที่ทำไปแล้ว
        const merged=[...existing.days];
        const s=Math.max(1,m.plan.startDay||1),e=Math.min(7,m.plan.endDay||7);
        let j=0;
        for(let i=s;i<=e;i++){if(m.plan.days[j]){merged[i-1]=m.plan.days[j];j++;}}
        LS.set(K.plan,{days:merged,createdAt:existing.createdAt});
        b.textContent="✅ ปรับแผนวันที่ "+s+"-"+e+" แล้ว";
      }else{
        LS.set(K.plan,{days:m.plan.days,createdAt:todayStr()});
        b.textContent="✅ บันทึกแล้ว";
      }
      b.disabled=true;
      toast("✅ บันทึกแผนลงหน้าออกกำลังแล้ว");
    }
  });
  document.querySelectorAll("[data-savedcal]").forEach(b=>b.onclick=()=>{
    const m=coachMsgs[+b.dataset.savedcal];
    if(m&&m.dcal&&Array.isArray(m.dcal.targets)){
      const start=m.dcal.startDate||todayStr();
      m.dcal.targets.forEach((cal,i)=>{
        if(typeof cal==="number"){
          const d=addDays(start,i);
          LS.set(K.dcal(d),{cal:Math.round(cal),note:m.dcal.note||null});
        }
      });
      b.textContent="✅ บันทึกเป้าแคลอรี่รายวันแล้ว";b.disabled=true;
      toast("🏦 ปรับเป้าแคลอรี่ "+m.dcal.targets.length+" วันแล้ว");
    }
  });
  document.querySelectorAll("[data-savefood]").forEach(b=>b.onclick=()=>{
    const m=coachMsgs[+b.dataset.savefood];
    if(m&&m.food&&m.food.items)openCoachFoodSave(m.food.items);
  });
  const inp=document.getElementById("coach-input");
  document.getElementById("coach-send").onclick=()=>coachSend(inp.value);
  inp.onkeydown=e=>{if(e.key==="Enter"&&!e.shiftKey)coachSend(inp.value);};
}

function bubbleHTML(m,idx){
  const planBtn=m.plan?`<button class="btn btn-primary btn-block" data-saveplan="${idx}" style="margin-top:10px">${m.plan.partial?`📋 ปรับแผนวันที่ ${m.plan.startDay}-${m.plan.endDay}`:"📋 บันทึกแผนนี้ลงหน้าออกกำลัง"}</button>`:"";

/* ── ตรวจจับช่วงเวลาจากข้อความผู้ใช้ ── */
function extractLookback(text){
  const t=(text||"").toLowerCase();
  const dm=t.match(/(\d+)\s*วัน/);if(dm)return Math.min(90,Math.max(1,+dm[1]));
  const wm=t.match(/(\d+)\s*สัปดาห์/);if(wm)return Math.min(90,+wm[1]*7);
  const mm=t.match(/(\d+)\s*เดือน/);if(mm)return Math.min(90,+mm[1]*30);
  if(/สัปดาห์ที่แล้ว|อาทิตย์ที่แล้ว/.test(t))return 7;
  if(/เดือนที่แล้ว|เดือนนี้/.test(t))return 30;
  if(/ทั้งหมด|ทั้งปี/.test(t))return 90;
  return 7; // default
}

function buildContext(lookbackDays=7){
  const p=LS.get(K.profile,null),t=computeTargets(p,latestBody()),lb=latestBody();
  const d=state.date,todayFood=LS.get(K.food(d),[]);
  const tt=todayFood.reduce((a,f)=>({c:a.c+f.cal,p:a.p+f.protein,cb:a.cb+f.carb,ft:a.ft+f.fat}),{c:0,p:0,cb:0,ft:0});
  let planLine="ยังไม่มีแผน";const plan=LS.get(K.plan,null);
  if(plan){const s=new Date(plan.createdAt+"T00:00:00"),c2=new Date(d+"T00:00:00");const di=((Math.floor((c2-s)/86400000)%7)+7)%7;const tp=plan.days?.[di];const wl=LS.get(K.workout(d),[]);planLine=`วันที่ ${di+1}/7 - ${tp?.focus||"วันพัก"} (ทำ ${wl.length} ท่า)`;}
  const todayList=todayFood.map(f=>`${MEALS.find(m=>m.id===f.meal)?.label}: ${f.name} ${f.cal}kcal`).join("; ")||"ยังไม่บันทึก";
  const cardio=LS.get(K.cardio(d),[]);
  const burn=cardio.reduce((a,c)=>a+(c.calories||0),0);
  const cardioList=cardio.map(c=>`${c.activity} ${c.duration||""} (${c.calories}kcal)`).join("; ")||"ยังไม่มี";
  let dcalLine="ไม่มี (ใช้เป้าปกติทุกวัน)";
  const dcals=[];
  for(let i=0;i<7;i++){const dd=addDays(d,i);const o=LS.get(K.dcal(dd),null);if(o&&typeof o.cal==="number")dcals.push(`${dd.slice(5)}:${o.cal}`);}
  if(dcals.length)dcalLine=dcals.join(", ");
  const dt=dayTarget(d,t);
  const hr=hrZone(p.age,lb?.heartRate);
  const hrLine=hr?`Max HR ${hr.maxHR}, Resting ${hr.rest}bpm${hr.usedDefault?"(ค่าเริ่มต้น)":"(จากเครื่องชั่ง)"} | ${hr.zones.map(z=>`Z${z.n}:${z.min}-${z.max}`).join(" ")}`:"ไม่มี (ขาดอายุ)";

  /* ── ประวัติย้อนหลัง N วัน ── */
  const ds=ds=>{ const p=ds.split("-"); return `${+p[2]}/${+p[1]}`; };

  // อาหารย้อนหลัง
  const foodHist=[];
  let totCal=0,totDays=0;
  for(let i=1;i<=lookbackDays;i++){
    const dd=addDays(d,-i);
    const fl=LS.get(K.food(dd),[]);
    if(fl.length){
      const cal=fl.reduce((a,f)=>a+f.cal,0);
      const prot=Math.round(fl.reduce((a,f)=>a+(f.protein||0),0));
      const flag=cal>t.cal*1.12?"⚠️เกิน":cal>=t.cal*0.85?"✅":"🔽ต่ำ";
      foodHist.push(`  ${ds(dd)}: ${cal}kcal P${prot}g ${flag}`);
      totCal+=cal;totDays++;
    }else{
      foodHist.push(`  ${ds(dd)}: ไม่บันทึก`);
    }
  }
  const avgCal=totDays?Math.round(totCal/totDays):0;

  // Workout ย้อนหลัง
  const wkHist=[];
  for(let i=1;i<=lookbackDays;i++){
    const dd=addDays(d,-i);
    const done=LS.get(K.workout(dd),[]);
    const exlog=LS.get(K.exlog(dd),{});
    const crd=LS.get(K.cardio(dd),[]);
    if(!done.length&&!crd.length)continue;
    const parts=[];
    if(done.length){
      const exParts=done.slice(0,4).map(name=>{
        const lg=exlog[name];
        if(lg?.sets?.length){const b=lg.sets.reduce((a,s)=>(+s.kg||0)>(+a.kg||0)?s:a,lg.sets[0]);return `${name}(${b.kg||0}×${b.reps||0})`;}
        return name;
      });
      const vol=Object.values(exlog).reduce((a,lg)=>a+logVolume(lg),0);
      parts.push(`เวท: ${exParts.join(",")}${vol?` [vol ${vol}kg]`:""}`);
    }
    if(crd.length){
      const cb=crd.reduce((a,c)=>a+(c.calories||0),0);
      parts.push(`cardio: ${crd.map(c=>c.activity+(c.duration?" "+c.duration:"")).join("+")} (${cb}kcal)`);
    }
    wkHist.push(`  ${ds(dd)}: ${parts.join(" | ")}`);
  }

  // น้ำหนัก trend
  const bodyRec=LS.get(K.body,[]).filter(b=>b.date>=addDays(d,-lookbackDays)&&b.date<=d).sort((a,b)=>a.date<b.date?-1:1);
  let trendLine="ไม่มีข้อมูลพอ";
  if(bodyRec.length>=2){
    const diff=+(bodyRec[bodyRec.length-1].weight-bodyRec[0].weight).toFixed(1);
    trendLine=`${bodyRec.map(b=>b.weight).slice(-6).join("→")} (${diff>0?"+":""}${diff}kg ใน ${lookbackDays}วัน)`;
  }else if(bodyRec.length===1){
    trendLine=`${bodyRec[0].weight}kg (มีข้อมูลแค่วันเดียวในช่วงนี้)`;
  }

  // น้ำ + fasting
  let totalW=0,wDays=0;
  for(let i=0;i<lookbackDays;i++){const w=LS.get(K.water(addDays(d,-i)),null);if(w!=null){totalW+=w;wDays++;}}
  const avgW=wDays?+(totalW/wDays).toFixed(1):null;
  const fast=LS.get(K.fast,null);
  const fastLine=fast&&fast.total?`${fast.mode||"16:8"} · streak ${fast.streak||0} วัน · สำเร็จ ${fast.done||0}/${fast.total||0} ครั้ง`:null;

  return`[ข้อมูลผู้ใช้ ณ ${fmtDate(d)} | ย้อนหลัง ${lookbackDays} วัน]
โปรไฟล์: ${p.gender==="male"?"ชาย":"หญิง"} อายุ ${p.age} สูง ${p.height}cm
ปัจจุบัน: น้ำหนัก ${lb?.weight||p.weight}kg BMI ${lb?.bmi||"-"} ไขมัน ${lb?.bodyFat!=null?lb.bodyFat+"%":"-"} มวลไขมัน ${lb?.fatMass!=null?lb.fatMass+"kg":"-"}
กล้ามเนื้อรวม ${lb?.muscleMass||"-"}kg กล้ามโครงร่าง ${lb?.skeletalMuscle||"-"}kg BMR ${t.bmr}
น้ำในร่างกาย ${lb?.waterPct!=null?lb.waterPct+"%":"-"} โปรตีน ${lb?.proteinPct!=null?lb.proteinPct+"%":"-"} ไขมันช่องท้อง ${lb?.visceralFat||"-"} หัวใจ ${lb?.heartRate!=null?lb.heartRate+"bpm":"-"}
HR Zone (Karvonen): ${hrLine}
เป้าหมาย: น้ำหนัก ${p.targetWeight||"-"}kg ไขมัน ${p.targetBf||"-"}%
แคลอรี่เป้าหมาย: ${t.cal} kcal (P${t.protein} C${t.carb} F${t.fat}) TDEE ${t.tdee}
เป้าวันนี้: ${dt.cal} kcal${dt.banked?" [ปรับโดยแผน]":""}
เป้าแคลอรี่รายวันที่ตั้งไว้: ${dcalLine}
วันนี้: กินไป ${tt.c} kcal เผาผลาญ ${burn} kcal สุทธิ ${tt.c-burn} kcal | P${tt.p} C${tt.cb} F${tt.ft}g
มื้อวันนี้: ${todayList}
คาร์ดิโอวันนี้: ${cardioList}
แผนวันนี้: ${planLine}
--- ประวัติ ${lookbackDays} วัน ---
อาหาร (เฉลี่ย ${avgCal} kcal/วัน):
${foodHist.join("\n")}
Workout (${wkHist.length} วันที่ออกกำลัง):
${wkHist.join("\n")||"  ไม่มีข้อมูล"}
น้ำหนัก trend: ${trendLine}
${avgW!=null?`น้ำเฉลี่ย: ${avgW} แก้ว/วัน`:"น้ำ: ไม่มีข้อมูล"}
${fastLine?`Fasting: ${fastLine}`:""}`;
}

  const inp=document.getElementById("coach-input");if(inp)inp.value="";

  if(body)body.scrollTop=body.scrollHeight;
  const sys=`คุณคือเทรนเนอร์ส่วนตัวมืออาชีพด้านลดไขมัน/ปั้นหุ่น พูดภาษาไทยเป็นกันเองแต่แม่นยำ
ใช้ข้อมูลจริงด้านล่าง ห้ามเดา ตอบกระชับ เป็นขั้นตอน บอกตัวเลขชัดเจน

พื้นฐานการออกกำลังของผู้ใช้: เดินชัน Zone 2 (60-70% max HR) ร่วมกับ weights training เป็นหลักอยู่แล้ว เวลาแนะนำแผนให้ยึดแนวนี้ เว้นแต่ผู้ใช้บอกเงื่อนไขอื่น

**1) แผนออกกำลังกาย — เมื่อผู้ใช้ขอสร้าง/ปรับแผน:**
อธิบายด้วยภาษาคนก่อน แล้วแนบ block ต่อท้าย (ผู้ใช้จะเห็นเป็นปุ่มบันทึก):
- สร้างแผนใหม่ทั้ง 7 วัน:
<PLAN>{"days":[{"day":"วันที่ 1","focus":"...","exercises":[{"name":"...","sets":"...","muscle":"..."}]}, ... ครบ 7 วัน]}</PLAN>
- ปรับเฉพาะบางวัน (เช่น ทำไป 4 วันแล้วอยากปรับวันที่ 5-7) ให้ใส่ partial:true และระบุช่วงวัน ใส่เฉพาะวันที่ต้องการแก้:
<PLAN>{"partial":true,"startDay":5,"endDay":7,"days":[{"day":"วันที่ 5","focus":"...","exercises":[...]},{"day":"วันที่ 6",...},{"day":"วันที่ 7",...}]}</PLAN>
(จำนวน object ใน days ต้องเท่ากับช่วง startDay-endDay พอดี ระบบจะรักษาวันอื่นไว้)

**2) Calorie Banking — เมื่อผู้ใช้มีเหตุพิเศษ (สัมมนา/งานเลี้ยง/เที่ยว) แล้วต้องการปรับแคลอรี่รายวัน:**
อธิบายเหตุผลก่อน แล้วแนบเป้าแคลอรี่รายวัน (เริ่มจากวันที่ผู้ใช้ระบุ หรือวันนี้) ผลรวมทั้งสัปดาห์ควรใกล้เคียงเดิมเพื่อรักษา deficit เฉลี่ย:
<DCAL>{"startDate":"today","note":"สัปดาห์มีสัมมนา","targets":[1600,1600,2000,2000,2000,1500,1500]}</DCAL>
ใส่ targets เป็นตัวเลข kcal ของแต่ละวันเรียงกัน (1-7 วัน) ถ้า startDate ใช้ "today" ได้

(fiber/sugar กรัม sodium มิลลิกรัม)
แยกอาหารแต่ละอย่างเป็น item คำนวณ cal/protein/carb/fat ตามปริมาณที่ผู้ใช้บอก ถ้าไม่ระบุปริมาณให้ประเมิน 1 หน่วยเสิร์ฟมาตรฐาน

แนบ block เฉพาะเมื่อผู้ใช้ขอจริง ถ้าแค่คุยทั่วไปห้ามใส่
${buildContext(lookbackDays)}`;
  try{

    const pm=reply.match(/<PLAN>([\s\S]*?)<\/PLAN>/);

      cleanText=cleanText.replace(/<PLAN>[\s\S]*?<\/PLAN>/,"").trim();

        const pj=extractJSON(pm[1]);

          if(pj.partial){
            const s=pj.startDay||1,e=pj.endDay||7;

              cleanText+=" ⚠️ ยังไม่มีแผนเดิม 7 วันให้ปรับ ลองสร้างแผนใหม่ทั้งหมดก่อนครับ";
            }else if(pj.days.length===(e-s+1)){
              planObj=pj;

              cleanText+=` ⚠️ จำนวนวันไม่ตรงช่วง ${s}-${e} ลองใหม่ครับ`;
            }
          }else if(pj.days.length===7){
            planObj=pj;
          }else{
            cleanText+=" ⚠️ แผนไม่ครบ 7 วัน ลองใหม่ได้ครับ";
          }
        }
      }catch(err){cleanText+=" ⚠️ บันทึกแผนไม่ได้ (JSON error) ลองขอใหม่ครับ";}
    }
    const dm=reply.match(/<DCAL>([\s\S]*?)<\/DCAL>/);
    if(dm){
      cleanText=cleanText.replace(/<DCAL>[\s\S]*?<\/DCAL>/,"").trim();
      try{
        const dj=extractJSON(dm[1]);
        if(dj&&Array.isArray(dj.targets)&&dj.targets.length>=1&&dj.targets.every(x=>typeof x==="number")){
          if(dj.startDate==="today"||!dj.startDate)dj.startDate=todayStr();

      }catch(err){cleanText+=" ⚠️ ปรับแคลอรี่รายวันไม่ได้ (JSON error) ลองใหม่ครับ";}
    }
    const fm=reply.match(/<FOOD>([\s\S]*?)<\/FOOD>/);
    let foodObj=null;
    if(fm){
      cleanText=cleanText.replace(/<FOOD>[\s\S]*?<\/FOOD>/,"").trim();
      try{
        const fj=extractJSON(fm[1]);
        if(fj&&Array.isArray(fj.items)&&fj.items.length){
          foodObj={items:fj.items.map(it=>({name:it.name||"อาหาร",cal:Math.round(it.cal)||0,protein:Math.round(it.protein)||0,carb:Math.round(it.carb)||0,fat:Math.round(it.fat)||0,fiber:Math.round(it.fiber)||0,sugar:Math.round(it.sugar)||0,sodium:Math.round(it.sodium)||0}))};
        }else{cleanText+=" ⚠️ บันทึกอาหารไม่ได้ (รูปแบบผิด) ลองใหม่ครับ";}
      }catch(err){cleanText+=" ⚠️ บันทึกอาหารไม่ได้ (JSON error) ลองใหม่ครับ";}
    }
    coachMsgs.push({role:"ai",text:cleanText,plan:planObj,dcal:dcalObj,food:foodObj});
  }catch(e){coachMsgs.push({role:"ai",text:aiError(e)});}
  renderCoachUI();
}

/* ══════════════════════════════
   PROFILE FORM
══════════════════════════════ */
function viewSetup(){
  return`<div class="setup">
    <div class="setup-head">
      <div class="setup-logo">📒</div>
      <div class="setup-ttl">FitLog</div>
      <div class="setup-sub">เทรนเนอร์ส่วนตัวที่จำทุกอย่างให้คุณ — ติดตามอาหาร น้ำหนัก และแผนออกกำลังกาย</div>
    </div>
    <div class="setup-body"><div id="pform"></div></div>
  </div>`;
}
function bindSetup(){
  renderProfileForm(document.getElementById("pform"),null,"เริ่มใช้งาน →",np=>{LS.set(K.profile,np);render();});
}
function renderProfileForm(box,initial,submitLabel,onSave){
  if(!box)return;
  const lb=latestBody();
  const p=initial||{gender:"male",age:"",weight:"",height:"",activity:1.375,goal:"lose",targetWeight:"",targetBf:""};
  let sel={gender:p.gender,goal:p.goal};
  box.innerHTML=`
    <div style="margin-bottom:12px">
      <div class="flbl">เพศ</div>
      <div class="seg" id="pf-g">
        <button data-g="male" class="${p.gender==="male"?"on":""}">ชาย</button>
        <button data-g="female" class="${p.gender==="female"?"on":""}">หญิง</button>
      </div>
    </div>
    <div class="row" style="margin-bottom:12px">
      <div class="field"><div class="flbl">อายุ</div><input id="pf-age" type="number" inputmode="decimal" value="${p.age||""}" placeholder="ปี"></div>
      <div class="field"><div class="flbl">${lb?"น้ำหนัก (เครื่องชั่ง)":"น้ำหนัก (kg)"}</div><input id="pf-w" type="number" inputmode="decimal" value="${lb?lb.weight:(p.weight||"")}" ${lb?"disabled":""} placeholder="kg"></div>
      <div class="field"><div class="flbl">ส่วนสูง (cm)</div><input id="pf-h" type="number" inputmode="decimal" value="${p.height||""}" placeholder="cm"></div>
    </div>
    <div style="margin-bottom:12px">
      <div class="flbl">ระดับกิจกรรม</div>
      <select id="pf-act" style="background:var(--bg3);color:var(--text)">
        ${ACTIVITY.map(a=>`<option value="${a.id}" ${+p.activity===a.id?"selected":""}>${a.label}</option>`).join("")}
      </select>
    </div>
    <div style="margin-bottom:12px">
      <div class="flbl">เป้าหมายหลัก</div>
      <div class="seg" id="pf-goal">
        ${GOALS.map(g=>`<button data-goal="${g.id}" class="${p.goal===g.id?"on":""}">${g.label}</button>`).join("")}
      </div>
    </div>
    <div class="goalbox" style="margin-bottom:14px">
      <div class="gt">🎯 เป้าหมายแบบละเอียด (ตั้งได้ทั้งคู่)</div>
      <div class="row">
        <div class="field"><div class="flbl">น้ำหนักเป้าหมาย (kg)</div><input id="pf-tw" type="number" inputmode="decimal" value="${p.targetWeight||""}"></div>
        <div class="field"><div class="flbl">% ไขมันเป้าหมาย</div><input id="pf-tbf" type="number" inputmode="decimal" value="${p.targetBf||""}"></div>
      </div>
    </div>
    <div class="err" id="pf-err" style="margin-bottom:8px"></div>
    <button class="btn-save" id="pf-submit">${submitLabel}</button>
  `;
  box.querySelectorAll("#pf-g button").forEach(b=>b.onclick=()=>{box.querySelectorAll("#pf-g button").forEach(x=>x.classList.remove("on"));b.classList.add("on");sel.gender=b.dataset.g;});
  box.querySelectorAll("#pf-goal button").forEach(b=>b.onclick=()=>{box.querySelectorAll("#pf-goal button").forEach(x=>x.classList.remove("on"));b.classList.add("on");sel.goal=b.dataset.goal;});
  box.querySelector("#pf-submit").onclick=()=>{
    const age=+box.querySelector("#pf-age").value,height=+box.querySelector("#pf-h").value;
    const weight=lb?lb.weight:+box.querySelector("#pf-w").value;
    if(!age||!height){setErr("pf-err","กรุณากรอกอายุและส่วนสูง");return;}
    if(!lb&&!weight){setErr("pf-err","กรุณากรอกน้ำหนัก");return;}
    onSave({gender:sel.gender,goal:sel.goal,age,height,weight,activity:+box.querySelector("#pf-act").value,targetWeight:+box.querySelector("#pf-tw").value||null,targetBf:+box.querySelector("#pf-tbf").value||null});
  };
}

/* ── utils ── */
let _sheetOverlay=null;
function showSheet(html,fullH){
  closeSheet();
  const o=document.createElement("div");o.className="overlay";o.id="overlay";
  o.innerHTML=`<div class="sheet" id="sheet" style="${fullH?"max-height:96vh;":""}">${html}</div>`;
  o.onclick=e=>{if(e.target===o)closeSheet();};
  document.body.appendChild(o);_sheetOverlay=o;
}
function closeSheet(){const o=document.getElementById("overlay");if(o)o.remove();_sheetOverlay=null;}
function setErr(id,msg){const e=document.getElementById(id);if(e)e.textContent=msg;}
function toast(msg){
  const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),2200);
}
/* PR celebration overlay */
function prCelebrate(exName,detail){
  const o=document.createElement("div");
  o.style.cssText="position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);animation:fadeIn .2s";
  o.innerHTML=`<div style="background:var(--card);border:1px solid var(--accent);border-radius:var(--r-xl);padding:32px 28px;text-align:center;max-width:300px;margin:20px;box-shadow:0 12px 48px var(--accent-glow);animation:popIn .35s cubic-bezier(.2,1.3,.4,1)">
    <div style="font-size:52px;margin-bottom:8px">🎉</div>
    <div style="font-size:20px;font-weight:900;color:var(--accent2);margin-bottom:6px">สถิติใหม่!</div>
    <div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px">${esc(exName)}</div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:18px">${esc(detail)}</div>
    <button id="pr-ok" class="btn-save">เยี่ยมมาก! 💪</button>
  </div>`;
  document.body.appendChild(o);
  const close=()=>o.remove();
  o.querySelector("#pr-ok").onclick=close;
  o.onclick=e=>{if(e.target===o)close();};
  setTimeout(close,5000);
}
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

render();
</script>
