<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FitLog">
<meta name="theme-color" content="#0F0F14">
<title>FitLog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
:root{
  --bg:#0F0F14;
  --bg2:#18181F;
  --bg3:#1F1F28;
  --card:#1C1C25;
  --card2:#222230;
  --border:#2A2A38;
  --text:#F0F0F5;
  --text2:#9090A8;
  --text3:#55556A;
  --accent:#7C6FF7;
  --accent2:#A89FF9;
  --accent-bg:rgba(124,111,247,0.12);
  --accent-glow:rgba(124,111,247,0.25);
  --green:#34D399;
  --green-bg:rgba(52,211,153,0.1);
  --amber:#FBBF24;
  --amber-bg:rgba(251,191,36,0.1);
  --red:#F87171;
  --red-bg:rgba(248,113,113,0.1);
  --teal:#22D3EE;
  --teal-bg:rgba(34,211,238,0.1);
  --r-sm:12px; --r-md:16px; --r-lg:20px; --r-xl:24px;
}
body{font-family:'Noto Sans Thai',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
#app{max-width:430px;margin:0 auto;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;position:relative;}

/* ── scrollable body ── */
.scroll{flex:1;overflow-y:auto;padding:12px 14px 100px;}
::-webkit-scrollbar{display:none;}

/* ── date bar ── */
.datebar{
  position:sticky;top:0;z-index:20;
  background:rgba(15,15,20,0.85);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:14px 14px calc(14px + env(safe-area-inset-top));
  display:flex;align-items:center;gap:10px;
}
.navbtn{
  width:36px;height:36px;border-radius:10px;border:1px solid var(--border);
  background:var(--card);color:var(--accent2);font-size:20px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .15s;
}
.navbtn:active{background:var(--card2);}
.navbtn:disabled{opacity:.25;}
.datemid{text-align:center;flex:1;}
.datemid .d{font-size:17px;font-weight:800;color:var(--text);}
.todaychip{
  margin-top:3px;background:var(--accent-bg);border:1px solid rgba(124,111,247,.3);
  color:var(--accent2);font-size:10px;font-weight:700;padding:2px 10px;
  border-radius:20px;cursor:pointer;letter-spacing:.5px;
}
.todaydot{font-size:10px;color:var(--accent);font-weight:700;margin-top:3px;letter-spacing:.5px;}

/* ── cards ── */
.card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);
  padding:16px;margin-bottom:12px;
}
.card-glow{box-shadow:0 0 0 1px var(--accent-glow),0 8px 32px rgba(0,0,0,.4);}
.lbl{font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:1px;}
.num{font-variant-numeric:tabular-nums;}

/* ── progress bar ── */
.bartrack{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:14px;}
.barfill{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1);}

/* ── meal card ── */
.mealcard{
  background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);
  padding:14px 16px;margin-bottom:10px;
}
.mealhead{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.mealhead .mname{font-weight:700;font-size:14px;}
.mealhead .mcal{font-size:11px;color:var(--text2);}
.addbtn{
  margin-left:auto;background:var(--accent-bg);border:1px solid rgba(124,111,247,.25);
  color:var(--accent2);font-size:11px;font-weight:700;padding:5px 12px;
  border-radius:20px;cursor:pointer;letter-spacing:.3px;
}
.foodrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--border);}
.foodrow .fn{font-size:13px;font-weight:500;color:var(--text);}
.foodrow .meta{font-size:11px;color:var(--text3);margin-top:1px;}
.foodrow .fcal{font-size:12px;font-weight:700;color:var(--text2);}
.delbtn{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:0 4px;line-height:1;}
.empty{font-size:12px;color:var(--text3);padding:4px 0 2px;}

/* ── stat boxes ── */
.statrow{display:flex;gap:8px;flex-wrap:wrap;}
.stat{
  flex:1;min-width:76px;background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--r-md);padding:12px;text-align:center;
}
.stat.hl{background:var(--accent-bg);border-color:rgba(124,111,247,.3);}
.stat .sl{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.stat .sv{font-size:20px;font-weight:800;color:var(--text);margin:2px 0 1px;}
.stat.hl .sv{color:var(--accent2);}
.stat .su{font-size:10px;color:var(--text3);}

/* ── macro bars ── */
.macro{flex:1;}
.macro .top{display:flex;justify-content:space-between;margin-bottom:4px;}
.macro .ml{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.macro .mv{font-size:10px;color:var(--text2);}
.macro .mt{height:4px;background:var(--bg3);border-radius:2px;}
.macro .mf{height:100%;border-radius:2px;transition:width .4s;}

/* ── forms ── */
.field{flex:1;}
.flbl{font-size:11px;color:var(--text2);margin-bottom:5px;font-weight:600;letter-spacing:.3px;}
input,select{
  width:100%;padding:11px 13px;
  background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-sm);
  font-size:14px;font-family:inherit;outline:none;color:var(--text);
  -webkit-appearance:none;appearance:none;
  transition:border-color .2s;
}
input:focus,select:focus{border-color:var(--accent);}
input:disabled{opacity:.5;cursor:not-allowed;}
input::placeholder{color:var(--text3);}
.row{display:flex;gap:8px;}

/* ── segments ── */
.seg{display:flex;gap:4px;background:var(--bg3);padding:3px;border-radius:var(--r-sm);border:1px solid var(--border);}
.seg button{
  flex:1;padding:8px 4px;border:none;border-radius:9px;
  background:none;color:var(--text3);font-weight:600;font-size:12px;
  cursor:pointer;font-family:inherit;transition:all .2s;
}
.seg button.on{
  background:var(--accent);color:#fff;font-weight:800;
  box-shadow:0 2px 8px var(--accent-glow);
}

/* ── buttons ── */
.btn{
  border:none;border-radius:var(--r-sm);padding:10px 18px;
  font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;
  transition:all .15s;
}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 4px 14px var(--accent-glow);}
.btn-primary:active{transform:scale(.97);}
.btn-ghost{background:var(--bg3);color:var(--text2);border:1px solid var(--border);}
.btn-ghost:active{background:var(--card2);}
.btn-save{
  width:100%;background:linear-gradient(135deg,var(--accent),#9B8FF9);color:#fff;
  border:none;border-radius:var(--r-md);padding:15px;
  font-weight:800;font-size:15px;cursor:pointer;font-family:inherit;margin-top:6px;
  box-shadow:0 4px 20px var(--accent-glow);transition:all .2s;
}
.btn-save:active{transform:scale(.98);}
.btn-block{width:100%;}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid rgba(248,113,113,.25);}

/* ── image picker ── */
.img-opts{display:flex;gap:8px;margin-bottom:12px;}
.imgbtn{
  flex:1;padding:18px 0;border:1px dashed var(--border);border-radius:var(--r-md);
  background:var(--bg3);display:flex;flex-direction:column;align-items:center;
  cursor:pointer;gap:6px;transition:border-color .2s;
}
.imgbtn:hover{border-color:var(--accent);}
.imgbtn .ic2{font-size:26px;}
.imgbtn .tx{font-size:11px;color:var(--text2);font-weight:600;}

/* ── badges/chips ── */
.chip{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--bg3);border:1px solid var(--border);border-radius:10px;
  padding:6px 10px;font-size:12px;cursor:pointer;margin:0 5px 5px 0;
}
.chip .cc{font-size:10px;color:var(--text3);}
.chip:hover{border-color:var(--accent);}
.warn{font-size:12px;color:var(--amber);background:var(--amber-bg);border:1px solid rgba(251,191,36,.2);border-radius:var(--r-sm);padding:10px 12px;line-height:1.5;}
.note{font-size:12px;color:var(--accent2);background:var(--accent-bg);border:1px solid rgba(124,111,247,.2);border-radius:var(--r-sm);padding:10px 12px;line-height:1.5;}
.err{color:var(--red);font-size:12px;padding:2px 0;}
.success{color:var(--green);font-size:12px;}

/* ── goal bar ── */
.goalbar{margin-bottom:14px;}
.goalbar .top{display:flex;justify-content:space-between;margin-bottom:5px;}
.goalbar .gl{font-size:13px;font-weight:600;}
.goalbar .gv{font-size:11px;color:var(--text2);}
.goalbar .track{height:7px;background:var(--bg3);border-radius:4px;overflow:hidden;}
.goalbar .fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--teal));border-radius:4px;}
.goalbar .gpct{font-size:10px;color:var(--text3);margin-top:3px;}

/* ── chart ── */
.chart{display:flex;align-items:flex-end;gap:3px;height:120px;}
.chart .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.chart .cv{font-size:8px;color:var(--text3);}
.chart .cb{width:100%;border-radius:3px 3px 0 0;}
.chart .cd{font-size:7px;color:var(--text3);}

/* ── tabbar ── */
.tabbar{
  position:fixed;bottom:0;left:0;right:0;max-width:430px;margin:0 auto;
  background:rgba(15,15,20,0.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  display:flex;padding:8px 0 calc(8px + env(safe-area-inset-bottom));z-index:30;
}
.tabbar button{
  flex:1;background:none;border:none;cursor:pointer;padding:6px 0;
  display:flex;flex-direction:column;align-items:center;gap:3px;
}
.tabbar .ic{font-size:22px;transition:transform .2s;}
.tabbar .tl{font-size:9px;font-weight:600;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;}
.tabbar button.on .ic{transform:scale(1.1);}
.tabbar button.on .tl{color:var(--accent2);}

/* ── coach fab ── */
.fab{
  position:fixed;bottom:82px;right:14px;
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),#9B8FF9);
  border:none;color:#fff;font-size:22px;cursor:pointer;
  box-shadow:0 8px 24px var(--accent-glow);z-index:40;
  display:flex;align-items:center;justify-content:center;
  transition:transform .2s;
}
.fab:active{transform:scale(.94);}
@media(min-width:458px){.fab{right:calc(50% - 215px + 14px);}}

/* ── overlay / sheet ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:flex-end;justify-content:center;z-index:100;backdrop-filter:blur(4px);}
.sheet{
  background:var(--bg2);width:100%;max-width:430px;
  border-radius:24px 24px 0 0;padding:12px 18px 32px;
  max-height:92vh;overflow-y:auto;
  animation:slideUp .28s cubic-bezier(.16,1,.3,1);
  border-top:1px solid var(--border);
}
.handle{width:36px;height:3px;background:var(--border);border-radius:2px;margin:0 auto 16px;}
.sheetTitle{font-weight:800;font-size:17px;color:var(--text);margin-bottom:2px;}
.sheetSub{font-size:12px;color:var(--text3);margin-bottom:16px;}

@keyframes slideUp{from{transform:translateY(100%);opacity:.5}to{transform:translateY(0);opacity:1}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── coach chat ── */
.chatwrap{display:flex;flex-direction:column;height:88vh;}
.chathead{
  display:flex;align-items:center;gap:10px;
  padding-bottom:12px;border-bottom:1px solid var(--border);
  margin-bottom:12px;
}
.avatar{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),#9B8FF9);
  display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;
}
.chatbody{flex:1;overflow-y:auto;padding:2px 0;display:flex;flex-direction:column;gap:10px;}
.msg{display:flex;gap:8px;animation:fadeIn .2s ease;}
.msg.user{flex-direction:row-reverse;}
.bubble{
  max-width:82%;padding:10px 14px;font-size:13.5px;line-height:1.6;white-space:pre-wrap;
  border-radius:var(--r-lg);
}
.msg.ai .bubble{background:var(--card2);color:var(--text);border-radius:4px var(--r-lg) var(--r-lg) var(--r-lg);}
.msg.user .bubble{background:var(--accent);color:#fff;border-radius:var(--r-lg) 4px var(--r-lg) var(--r-lg);}
.quick{display:flex;gap:6px;flex-wrap:wrap;padding:8px 0;}
.quick button{
  background:var(--card);border:1px solid var(--border);border-radius:20px;
  padding:7px 12px;font-size:12px;color:var(--text2);cursor:pointer;font-family:inherit;
  transition:all .15s;
}
.quick button:hover{border-color:var(--accent);color:var(--accent2);}
.chatinput{display:flex;gap:8px;padding-top:10px;border-top:1px solid var(--border);}
.chatinput input{border-radius:20px;background:var(--card);}
.sendbtn{
  width:42px;height:42px;border-radius:50%;border:none;
  background:var(--accent);color:#fff;font-size:16px;cursor:pointer;flex-shrink:0;
  box-shadow:0 4px 12px var(--accent-glow);transition:all .15s;
}
.sendbtn:disabled{background:var(--bg3);box-shadow:none;}
.dots{display:flex;gap:4px;padding:12px 14px;background:var(--card2);border-radius:4px var(--r-lg) var(--r-lg) var(--r-lg);}
.dots span{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:bounce 1.2s infinite;}
.dots span:nth-child(2){animation-delay:.2s;}.dots span:nth-child(3){animation-delay:.4s;}

/* ── setup ── */
.setup{min-height:100vh;display:flex;flex-direction:column;}
.setup-head{
  padding:calc(48px + env(safe-area-inset-top)) 24px 24px;
  background:linear-gradient(180deg,rgba(124,111,247,.08) 0%,transparent 100%);
}
.setup-logo{font-size:48px;margin-bottom:12px;}
.setup-ttl{font-size:28px;font-weight:900;background:linear-gradient(135deg,#fff,var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.setup-sub{font-size:14px;color:var(--text2);margin-top:6px;line-height:1.5;}
.setup-body{flex:1;overflow-y:auto;padding:0 16px 40px;}
.goalbox{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-md);padding:14px;margin-top:4px;}
.goalbox .gt{font-size:11px;color:var(--accent2);font-weight:700;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px;}

/* ── hint empty ── */
.hint{text-align:center;padding:48px 20px;color:var(--text3);}
.hint .ic{font-size:44px;margin-bottom:10px;opacity:.6;}
.hint .ht{font-size:14px;color:var(--text2);}
.hint .hs{font-size:12px;color:var(--text3);margin-top:4px;}

/* ── toast ── */
.toast{
  position:fixed;bottom:110px;left:50%;transform:translateX(-50%);
  background:var(--card2);border:1px solid var(--border);color:var(--text);
  padding:10px 18px;border-radius:20px;font-size:13px;z-index:200;
  opacity:0;transition:opacity .25s;pointer-events:none;
  box-shadow:0 8px 24px rgba(0,0,0,.5);white-space:nowrap;
}
.toast.show{opacity:1;}

/* ── key status ── */
.keystatus{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;letter-spacing:.3px;}
.keystatus.ok{color:var(--green);}.keystatus.no{color:var(--red);}

/* ── workout ── */
.daycard{
  background:linear-gradient(135deg,var(--accent-bg),var(--teal-bg));
  border:1px solid rgba(124,111,247,.2);border-radius:var(--r-lg);padding:16px;
  margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;
}
.exrow{
  display:flex;align-items:center;gap:10px;padding:10px 0;
  border-top:1px solid var(--border);transition:opacity .2s;
}
.excheck{
  width:26px;height:26px;border-radius:8px;border:2px solid var(--border);
  background:none;color:#fff;cursor:pointer;font-size:13px;
  flex-shrink:0;transition:all .2s;display:flex;align-items:center;justify-content:center;
}
.excheck.done{background:var(--green);border-color:var(--green);}

/* ── section header ── */
.sechead{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.scanBtn{
  background:var(--accent);border:none;color:#fff;
  font-size:11px;font-weight:700;padding:6px 12px;border-radius:20px;cursor:pointer;
  letter-spacing:.3px;box-shadow:0 4px 10px var(--accent-glow);
}
h3{font-size:15px;font-weight:700;color:var(--text);}
.small{font-size:11px;color:var(--text3);line-height:1.5;}
.divider{height:1px;background:var(--border);margin:14px 0;}
.sLabel{
  font-size:10px;font-weight:700;color:var(--text3);
  text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;
}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>
<script>
/* ============================================================
   FitLog v3 — Dark Edition
   - แก้ JSON parse error (workout plan)
   - รูปจาก library + กล้อง
   - UI ใหม่ dark premium
   ============================================================ */

const MEALS=[{id:"breakfast",label:"เช้า",icon:"🌅"},{id:"lunch",label:"กลางวัน",icon:"☀️"},{id:"dinner",label:"เย็น",icon:"🌙"},{id:"snack",label:"ว่าง",icon:"🍎"}];
const ACTIVITY=[{id:1.2,label:"นั่งทำงาน ไม่ออกกำลังกาย"},{id:1.375,label:"ออกกำลังเบา 1-3 วัน/สัปดาห์"},{id:1.55,label:"ออกกำลังปานกลาง 3-5 วัน"},{id:1.725,label:"ออกกำลังหนัก 6-7 วัน"}];
const GOALS=[{id:"lose",label:"ลดไขมัน"},{id:"recomp",label:"ลดไขมัน+เพิ่มกล้าม"},{id:"gain",label:"เพิ่มกล้าม"}];
const MODEL="claude-sonnet-4-6";

/* ── storage ── */
const LS={
  get(k,fb){try{const v=localStorage.getItem(k);return v!=null?JSON.parse(v):fb;}catch{return fb;}},
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){console.error(e);}},
  del(k){localStorage.removeItem(k);}
};
const K={profile:"fl_profile",key:"fl_key",body:"fl_body",plan:"fl_plan",fav:"fl_fav",food:d=>"fl_food_"+d,workout:d=>"fl_wk_"+d,cardio:d=>"fl_cardio_"+d,exlog:d=>"fl_exlog_"+d,exhist:"fl_exhist"};

/* ── date ── */
const todayStr=()=>new Date().toLocaleDateString("sv-SE");
const addDays=(s,n)=>{const d=new Date(s+"T00:00:00");d.setDate(d.getDate()+n);return d.toLocaleDateString("sv-SE");};
const isToday=s=>s===todayStr();
function fmtDate(s){
  const d=new Date(s+"T00:00:00");
  const dy=["อา","จ","อ","พ","พฤ","ศ","ส"];
  const m=["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
  return `${dy[d.getDay()]} ${d.getDate()} ${m[d.getMonth()]}`;
}

/* ── nutrition ── */
function mifflin(p,w){return p.gender==="male"?10*w+6.25*p.height-5*p.age+5:10*w+6.25*p.height-5*p.age-161;}
function latestBody(){const b=LS.get(K.body,[]);return b.length?[...b].sort((a,c)=>a.date<c.date?1:-1)[0]:null;}
function computeTargets(p,body){
  const w=body?.weight??p.weight??70;
  const bmr=Math.round(body?.bmr??mifflin(p,w));
  const tdee=Math.round(bmr*(p.activity||1.375));
  const bf=body?.bodyFat??null;
  const lean=bf?w*(1-bf/100):w*0.78;
  const dir=p.targetWeight?(p.targetWeight<w?"lose":p.targetWeight>w?"gain":"maintain"):"lose";
  let cal=dir==="lose"?tdee-500:dir==="gain"?tdee+250:tdee;
  cal=Math.max(1200,Math.round(cal));
  const protein=Math.round(lean*2.4);
  const fat=Math.round(cal*0.25/9);
  const carb=Math.max(0,Math.round((cal-protein*4-fat*9)/4));
  return{bmr,tdee,cal,protein,carb,fat,lean:Math.round(lean*10)/10,bf};
}
function impliedWeight(body,tbf){
  if(!body?.bodyFat||!tbf)return null;
  const lean=body.weight*(1-body.bodyFat/100);
  return Math.round(lean/(1-tbf/100)*10)/10;
}

function getKey(){return LS.get(K.key,"")||"";}
async function callClaude({system,messages,max_tokens=1200}){
  const key=getKey();
  if(!key)throw new Error("NO_KEY");
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"content-type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:MODEL,max_tokens,...(system?{system}:{}),messages})
  });
  if(!res.ok){const t=await res.text();throw new Error(res.status+":"+t.slice(0,120));}
  const data=await res.json();
  return (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
}

/* ── robust JSON parser (แก้ bug หลัก) ── */
function extractJSON(txt){
  // ลอง extract JSON จาก ```json ... ``` ก่อน
  const fence=txt.match(/```(?:json)?\s*([\s\S]*?)```/);
  if(fence)txt=fence[1];
  txt=txt.trim();
  // หาก block เริ่มด้วย { หรือ [
  const start=txt.search(/[{\[]/);
  if(start>0)txt=txt.slice(start);
  // ตัด trailing text หลัง JSON จบ
  let depth=0,end=0,inStr=false,esc=false;
  for(let i=0;i<txt.length;i++){
    const c=txt[i];
    if(esc){esc=false;continue;}
    if(c==="\\"&&inStr){esc=true;continue;}
    if(c==='"')inStr=!inStr;
    if(!inStr){
      if(c==="{"||c==="[")depth++;
      if(c==="}"||c==="]"){depth--;if(depth===0){end=i+1;break;}}
    }
  }
  if(end>0)txt=txt.slice(0,end);
  return JSON.parse(txt);
}

function aiError(e){
  const m=String(e.message||e);
  if(m.includes("NO_KEY"))return"⚠️ ยังไม่ได้ใส่ API key (ไปที่ เพิ่มเติม → 🔑 API Key)";
  if(m.includes("401"))return"⚠️ API key ไม่ถูกต้อง";
  if(m.includes("429"))return"⚠️ เครดิตหมด หรือถึง rate limit";
  if(m.includes("400"))return"⚠️ คำขอผิดพลาด ลองใหม่";
  return"⚠️ เกิดข้อผิดพลาด: "+m.slice(0,80);
}

/* SVG silhouette ที่เปลี่ยนรูปร่าง/สีตามน้ำหนัก + %ไขมัน */
function bodyAvatarSVG(weight,bf,bmi,gender){
  // ความกว้างลำตัว: ยิ่งไขมัน/BMI สูง ยิ่งกว้าง
  let fatLevel;
  if(bf!=null){
    fatLevel=gender==="female"
      ? Math.max(0,Math.min(1,(bf-18)/22))   // หญิง 18-40%
      : Math.max(0,Math.min(1,(bf-8)/22));    // ชาย 8-30%
  }else{
    fatLevel=Math.max(0,Math.min(1,(bmi-19)/13)); // 19-32 BMI
  }
  // สี gradient: เขียว(ฟิต) → เหลือง → ส้ม → แดง
  const hue=120-fatLevel*120; // 120=เขียว, 0=แดง
  const c1=`hsl(${hue},70%,55%)`;
  const c2=`hsl(${hue},65%,42%)`;
  // ปรับความกว้างของลำตัว/เอว
  const torsoW=44+fatLevel*26;      // 44-70
  const waistW=34+fatLevel*34;      // 34-68 (เอวขยายเยอะสุด)
  const cx=110;
  return`<svg viewBox="0 0 220 280" width="150" height="190" xmlns="http://www.w3.org/2000/svg" style="display:block;margin:0 auto">
    <defs>
      <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${c1}"/>
        <stop offset="100%" stop-color="${c2}"/>
      </linearGradient>
      <filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>
    <g fill="url(#bodyGrad)" filter="url(#glow)">
      <!-- head -->
      <circle cx="${cx}" cy="38" r="22"/>
      <!-- neck -->
      <rect x="${cx-9}" y="56" width="18" height="14" rx="4"/>
      <!-- torso (เปลี่ยนความกว้าง) -->
      <path d="M ${cx-torsoW/2} 70
               Q ${cx-torsoW/2-8} 95 ${cx-waistW/2} 150
               Q ${cx-waistW/2+4} 178 ${cx-26} 190
               L ${cx+26} 190
               Q ${cx+waistW/2-4} 178 ${cx+waistW/2} 150
               Q ${cx+torsoW/2+8} 95 ${cx+torsoW/2} 70
               Q ${cx} 62 ${cx-torsoW/2} 70 Z"/>
      <!-- arms -->
      <path d="M ${cx-torsoW/2+4} 74 Q ${cx-torsoW/2-22} 110 ${cx-torsoW/2-14} 158 L ${cx-torsoW/2-2} 156 Q ${cx-torsoW/2-6} 112 ${cx-torsoW/2+14} 82 Z"/>
      <path d="M ${cx+torsoW/2-4} 74 Q ${cx+torsoW/2+22} 110 ${cx+torsoW/2+14} 158 L ${cx+torsoW/2+2} 156 Q ${cx+torsoW/2+6} 112 ${cx+torsoW/2-14} 82 Z"/>
      <!-- legs -->
      <path d="M ${cx-26} 190 L ${cx-30} 268 L ${cx-14} 268 L ${cx-6} 196 Z"/>
      <path d="M ${cx+26} 190 L ${cx+30} 268 L ${cx+14} 268 L ${cx+6} 196 Z"/>
    </g>
  </svg>`;
}

function bodyStatus(bf,bmi,gender){

/* รวบรวมอาหารที่กินบ่อย/ล่าสุด จาก 30 วันหลัง */
function recentFoods(){
  const seen={},order=[];
  for(let i=0;i<30;i++){
    const d=addDays(todayStr(),-i);
    const fl=LS.get(K.food(d),[]);
    fl.forEach(f=>{
      const key=f.name.trim().toLowerCase();
      if(!seen[key]){seen[key]={name:f.name,cal:f.cal,protein:f.protein,carb:f.carb,fat:f.fat,count:0};order.push(key);}
      seen[key].count++;
    });
  }
  // เรียงตามความถี่ แล้วเอา 10 อันดับ
  return order.map(k=>seen[k]).sort((a,b)=>b.count-a.count).slice(0,10);
}

function renderImgPicker(box,imgState,hint,onAnalyze){

    <div id="ip-preview"></div>
  `;
  const fileCam=box.querySelector("#ip-file-cam"),fileLib=box.querySelector("#ip-file-lib");
  box.querySelector("#ip-cam").onclick=()=>fileCam.click();
  box.querySelector("#ip-lib").onclick=()=>fileLib.click();

      box.querySelector("#ip-change").onclick=()=>renderImgPicker(box,imgState,hint,onAnalyze);

  fileCam.onchange=e=>handleFile(e.target.files[0]);
  fileLib.onchange=e=>handleFile(e.target.files[0]);

/* สรุปแนวโน้ม + อัตราต่อสัปดาห์ */
function trendSummary(data){
  if(data.length<2)return `<div class="small">ข้อมูลยังไม่พอในช่วงนี้</div>`;
  const f=data[0],l=data[data.length-1];
  const days=Math.max(1,(new Date(l.date)-new Date(f.date))/86400000);
  const weeks=days/7;
  const rows=[];
  const wChange=l.weight-f.weight;
  rows.push(["น้ำหนัก",wChange,"kg",wChange/weeks]);
  if(f.bodyFat!=null&&l.bodyFat!=null)rows.push(["ไขมัน",l.bodyFat-f.bodyFat,"%",(l.bodyFat-f.bodyFat)/weeks]);
  if(f.muscleMass!=null&&l.muscleMass!=null)rows.push(["กล้ามเนื้อ",l.muscleMass-f.muscleMass,"kg",(l.muscleMass-f.muscleMass)/weeks]);
  return`<div style="display:flex;flex-direction:column;gap:8px">
    ${rows.map(([label,chg,unit,perWeek])=>{
      const good=label==="กล้ามเนื้อ"?chg>=0:chg<=0;
      const col=Math.abs(chg)<0.05?"var(--text2)":good?"var(--green)":"var(--red)";
      const arrow=chg<0?"▼":chg>0?"▲":"–";
      return`<div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:13px;color:var(--text2)">${label}</span>
        <span style="font-size:13px;font-weight:700;color:${col}">${arrow} ${Math.abs(chg).toFixed(1)}${unit} <span style="font-size:10px;color:var(--text3);font-weight:500">(${perWeek>=0?"+":""}${perWeek.toFixed(2)}${unit}/สัปดาห์)</span></span>
      </div>`;
    }).join("")}
    <div class="small" style="margin-top:2px">ช่วง ${Math.round(days)} วัน (${data.length} ครั้งที่ชั่ง)</div>
  </div>`;
}

function goalBar(label,from,now,target,unit){
  const start=from??now,total=Math.abs(start-target)||1,done=Math.abs(start-now),pct=Math.min(100,Math.round(done/total*100));
  return`<div class="goalbar">
    <div class="top"><span class="gl">${label}</span><span class="gv num">${now}${unit} → ${target}${unit}</span></div>
    <div class="track"><div class="fill" style="width:${pct}%"></div></div>
    <div class="gpct">คืบหน้า ${pct}% (จาก ${start}${unit})</div>
  </div>`;
}

function trendCard(title,data,field,color){
  const vals=data.map(d=>d[field]),max=Math.max(...vals),min=Math.min(...vals),range=max-min||1;
  return`<div class="card"><div class="lbl" style="margin-bottom:12px">${title}</div>
    <div class="chart">${data.slice(-14).map(d=>{
      const h=16+(d[field]-min)/range*90;
      return`<div class="col"><div class="cv num">${d[field]}</div><div class="cb" style="height:${h}px;background:${color};opacity:.7"></div><div class="cd">${d.date.slice(5)}</div></div>`;
    }).join("")}</div></div>`;
}

/* หา log ครั้งล่าสุดของท่านี้ (ก่อนวันที่ปัจจุบัน) */
function lastExLog(name,beforeDate){
  for(let i=1;i<=60;i++){
    const d=addDays(beforeDate,-i);
    const log=LS.get(K.exlog(d),{});
    if(log[name])return log[name];
  }
  return null;
}

function bindWorkout(){
  const gen=document.getElementById("gen");
  if(gen)gen.onclick=async()=>{
    gen.textContent="🤖 กำลังสร้าง...";gen.disabled=true;
    setErr("gen-err","");
    await generatePlan("gen-err");
    gen.textContent="🤖 สร้างแผนด้วย AI";gen.disabled=false;
  };
  const regen=document.getElementById("regen");
  if(regen)regen.onclick=()=>{if(confirm("สร้างแผนใหม่? แผนเดิมจะถูกลบ")){LS.del(K.plan);render();}};
  document.querySelectorAll(".excheck").forEach(b=>b.onclick=()=>{
    const n=b.dataset.ex;let d=LS.get(K.workout(state.date),[]);
    d=d.includes(n)?d.filter(x=>x!==n):[...d,n];
    LS.set(K.workout(state.date),d);render();
  });
  // เปิด sheet บันทึกน้ำหนัก/reps ของท่า
  const plan=LS.get(K.plan,null);
  if(plan){
    const s=new Date(plan.createdAt+"T00:00:00"),c=new Date(state.date+"T00:00:00");
    const di=((Math.floor((c-s)/86400000)%7)+7)%7,today=plan.days?.[di];
    document.querySelectorAll("[data-exlog]").forEach(el=>el.onclick=()=>{
      const ex=today.exercises[+el.dataset.exlog];
      openExLog(ex);
    });
  }
  // cardio
  const cdel=document.querySelectorAll("[data-cardiodel]");
  cdel.forEach(b=>b.onclick=()=>{
    const list=LS.get(K.cardio(state.date),[]).filter(c=>String(c.id)!==b.dataset.cardiodel);
    LS.set(K.cardio(state.date),list);render();
  });
  const cp=document.getElementById("cardio-photo");if(cp)cp.onclick=openCardioPhoto;
  const cm=document.getElementById("cardio-manual");if(cm)cm.onclick=openCardioManual;
}

/* บันทึกน้ำหนัก/reps/โน้ตของท่า */
function openExLog(ex){
  const exlog=LS.get(K.exlog(state.date),{});
  const cur=exlog[ex.name]||{};
  const last=lastExLog(ex.name,state.date);
  showSheet(`
    <div class="handle"></div>
    <div class="sheetTitle">${esc(ex.name)}</div>
    <div class="sheetSub">${esc(ex.muscle||"")} · เป้า ${esc(ex.sets||"")}</div>
    ${last?`<div class="note" style="margin-bottom:14px">📈 ครั้งก่อน: ${esc(last.detail||"")}${last.notes?" · "+esc(last.notes):""}</div>`:""}
    <div class="row" style="margin-bottom:10px">
      <div class="field"><div class="flbl">น้ำหนัก (kg)</div><input id="el-weight" type="number" inputmode="decimal" value="${cur.weight??""}" placeholder="เช่น 80"></div>
      <div class="field"><div class="flbl">เซ็ต × ครั้ง</div><input id="el-reps" value="${esc(cur.reps??"")}" placeholder="เช่น 3x10"></div>
    </div>
    <div style="margin-bottom:12px"><div class="flbl">โน้ต (ไม่บังคับ)</div><input id="el-notes" value="${esc(cur.notes??"")}" placeholder="เช่น รู้สึกหนัก เพิ่มได้อีก"></div>
    <button class="btn-save" id="el-save">บันทึก</button>
    ${cur.detail?`<button class="btn btn-ghost btn-block" id="el-clear" style="margin-top:8px">ลบบันทึกนี้</button>`:""}
  `);
  document.getElementById("el-save").onclick=()=>{
    const w=document.getElementById("el-weight").value;
    const reps=document.getElementById("el-reps").value.trim();
    const notes=document.getElementById("el-notes").value.trim();
    const detail=[w?w+"kg":"",reps].filter(Boolean).join(" × ");
    const log=LS.get(K.exlog(state.date),{});
    log[ex.name]={weight:w?+w:null,reps,notes,detail};
    LS.set(K.exlog(state.date),log);
    // mark ว่าทำท่านี้แล้วด้วย
    let d=LS.get(K.workout(state.date),[]);if(!d.includes(ex.name)){d.push(ex.name);LS.set(K.workout(state.date),d);}
    closeSheet();render();toast("✅ บันทึกแล้ว");
  };
  const clr=document.getElementById("el-clear");
  if(clr)clr.onclick=()=>{const log=LS.get(K.exlog(state.date),{});delete log[ex.name];LS.set(K.exlog(state.date),log);closeSheet();render();};
}

async function generatePlan(errId){
  const p=LS.get(K.profile,null);
  try{
    const txt=await callClaude({
      max_tokens:2500,
      system:"ตอบเป็น JSON เท่านั้น ห้ามมีข้อความอื่น ห้ามใช้ markdown code block",
      messages:[{role:"user",content:`สร้างแผนออกกำลังกาย 7 วัน สำหรับ เพศ${p.gender==="male"?"ชาย":"หญิง"} อายุ${p.age}ปี เป้าหมาย${GOALS.find(g=>g.id===p.goal)?.label||"ลดไขมัน"}

หลักการสำคัญ (ต้องทำตาม):
- ผสมผสาน weights training กับ Zone 2 cardio เสมอ
- Zone 2 cardio (เดินชัน/เดินเร็ว/ปั่นจักรยานเบาๆ ที่ 60-70% max HR) ให้มี 2-3 วัน เป็นพื้นฐานสำคัญ
- Weights training ให้มี 2-3 วัน โดยแบ่ง muscle group ต่างกัน
- มีวันพัก 1-2 วัน
- สามารถรวม weights + zone 2 ในวันเดียวกันได้ (เช่น เวทเสร็จต่อด้วยเดินชัน 20-30 นาที)

ตอบ JSON ตามรูปแบบนี้เท่านั้น:
{"days":[{"day":"วันที่ 1","focus":"หน้าอก/ไหล่ + Zone 2","exercises":[{"name":"Bench Press","sets":"4x10","muscle":"หน้าอก"},{"name":"เดินชัน Zone 2","sets":"20 นาที","muscle":"cardio"}]},{"day":"วันที่ 2","focus":"Zone 2 Cardio","exercises":[{"name":"เดินชัน Zone 2","sets":"45 นาที","muscle":"cardio"}]},{"day":"วันที่ 3","focus":"ขา + Zone 2","exercises":[{"name":"Squat","sets":"4x12","muscle":"ต้นขา"}]},{"day":"วันที่ 4","focus":"วันพัก","exercises":[]},{"day":"วันที่ 5","focus":"หลัง/แขน","exercises":[{"name":"Pull-up","sets":"3x8","muscle":"หลัง"}]},{"day":"วันที่ 6","focus":"Zone 2 Cardio","exercises":[{"name":"เดินชัน Zone 2","sets":"45 นาที","muscle":"cardio"}]},{"day":"วันที่ 7","focus":"วันพัก","exercises":[]}]}
ให้มีครบ 7 วัน วันที่เป็น weights ให้มีท่า 4-6 ท่า`}]
    });
    const r=extractJSON(txt);
    if(!r.days||!Array.isArray(r.days))throw new Error("รูปแบบ JSON ไม่ถูกต้อง");
    LS.set(K.plan,{days:r.days,createdAt:todayStr()});
    render();toast("✅ สร้างแผนสำเร็จ");
  }catch(e){setErr(errId,aiError(e));}
}

      Object.keys(d).forEach(k=>{if(k.startsWith("fl_"))localStorage.setItem(k,d[k]);});
      render();toast("✅ นำเข้าสำเร็จ");
    }catch{toast("❌ ไฟล์ไม่ถูกต้อง");}};
    r.readAsText(f);
  };
}
function setErr2(id,msg){const e=document.getElementById(id);if(e){e.textContent=msg;e.className=msg.startsWith("✅")?"success":"err";}}

/* ══════════════════════════════

══════════════════════════════ */
function openCoach(){
  if(!getKey()){
    showSheet(`
      <div class="handle"></div>
      <div class="sheetTitle">เทรนเนอร์ AI</div>
      <div class="warn" style="margin-top:10px">ฟีเจอร์นี้ต้องใส่ API key ก่อน</div>
      <button class="btn-save" id="gokey" style="margin-top:14px">ไปใส่ key</button>
    `);
    document.getElementById("gokey").onclick=()=>{closeSheet();state.tab="more";render();};
    return;
  }
  if(!coachMsgs.length)coachMsgs=[{role:"ai",text:"สวัสดีครับ 👋 ผมเห็นข้อมูลทั้งหมดของคุณแล้ว\n\nมีอะไรให้ช่วยไหม? เช่น:\n• วันนี้กินเกิน ต้องทำยังไง?\n• พรุ่งนี้มีงานเลี้ยง วางแผนยังไงดี?\n• ตอนนี้ตรงเป้าหมายไหม?"}];
  renderCoachUI();
}

function renderCoachUI(){
  const quick=["📊 ตรวจสอบความคืบหน้า","🎉 พรุ่งนี้มีงานเลี้ยง","😅 วันนี้กินเกินไปแล้ว","🍽 แนะนำมื้อเย็นวันนี้"];
  showSheet(`
    <div class="handle"></div>
    <div class="chatwrap">
      <div class="chathead">
        <div class="avatar">💬</div>
        <div>
          <div style="font-weight:800;font-size:15px">เทรนเนอร์ AI</div>
          <div style="font-size:10px;color:var(--green);font-weight:700;letter-spacing:.3px">● เข้าถึงข้อมูลจริงของคุณ</div>
        </div>
        <button id="coach-close" style="margin-left:auto;background:var(--bg3);border:1px solid var(--border);border-radius:50%;width:30px;height:30px;font-size:15px;color:var(--text2);cursor:pointer">×</button>
      </div>
      <div class="chatbody" id="chatbody">${coachMsgs.map((m,i)=>bubbleHTML(m,i)).join("")}</div>
      ${coachMsgs.length<=1?`<div class="quick" id="quickbtns">${quick.map(q=>`<button data-q="${esc(q)}">${q}</button>`).join("")}</div>`:""}
      <div class="chatinput">
        <input id="coach-input" placeholder="ถามเทรนเนอร์...">
        <button class="sendbtn" id="coach-send">➤</button>
      </div>
    </div>
  `,true);
  const body=document.getElementById("chatbody");body.scrollTop=body.scrollHeight;
  document.getElementById("coach-close").onclick=closeSheet;
  document.querySelectorAll("[data-q]").forEach(b=>b.onclick=()=>coachSend(b.dataset.q));
  document.querySelectorAll("[data-saveplan]").forEach(b=>b.onclick=()=>{
    const m=coachMsgs[+b.dataset.saveplan];
    if(m&&m.plan&&m.plan.days){
      LS.set(K.plan,{days:m.plan.days,createdAt:todayStr()});
      b.textContent="✅ บันทึกแล้ว";b.disabled=true;
      toast("✅ บันทึกแผนลงหน้าออกกำลังแล้ว");
    }
  });
  const inp=document.getElementById("coach-input");
  document.getElementById("coach-send").onclick=()=>coachSend(inp.value);
  inp.onkeydown=e=>{if(e.key==="Enter"&&!e.shiftKey)coachSend(inp.value);};
}

function bubbleHTML(m,idx){
  const planBtn=m.plan?`<button class="btn btn-primary btn-block" data-saveplan="${idx}" style="margin-top:10px">📋 บันทึกแผนนี้ลงหน้าออกกำลัง</button>`:"";
  return`<div class="msg ${m.role==="user"?"user":"ai"}">
    ${m.role==="ai"?`<div class="avatar" style="width:28px;height:28px;font-size:13px;flex-shrink:0">💬</div>`:""}
    <div class="bubble">${esc(m.text)}${planBtn}</div>
  </div>`;
}

function buildContext(){
  const p=LS.get(K.profile,null),t=computeTargets(p,latestBody()),lb=latestBody();
  const d=state.date,todayFood=LS.get(K.food(d),[]);
  const tt=todayFood.reduce((a,f)=>({c:a.c+f.cal,p:a.p+f.protein,cb:a.cb+f.carb,ft:a.ft+f.fat}),{c:0,p:0,cb:0,ft:0});
  let weekCal=0,days=0;
  for(let i=0;i<7;i++){const dd=addDays(d,-i);const fl=LS.get(K.food(dd),[]);if(fl.length){weekCal+=fl.reduce((a,f)=>a+f.cal,0);days++;}}
  const avg=days?Math.round(weekCal/days):0;
  let planLine="ยังไม่มีแผน";const plan=LS.get(K.plan,null);
  if(plan){const s=new Date(plan.createdAt+"T00:00:00"),c2=new Date(d+"T00:00:00");const di=((Math.floor((c2-s)/86400000)%7)+7)%7;const tp=plan.days?.[di];const wl=LS.get(K.workout(d),[]);planLine=`วันที่ ${di+1}/7 - ${tp?.focus||"วันพัก"} (ทำ ${wl.length} ท่า)`;}
  const todayList=todayFood.map(f=>`${MEALS.find(m=>m.id===f.meal)?.label}: ${f.name} ${f.cal}kcal`).join("; ")||"ยังไม่บันทึก";
  const cardio=LS.get(K.cardio(d),[]);
  const burn=cardio.reduce((a,c)=>a+(c.calories||0),0);
  const cardioList=cardio.map(c=>`${c.activity} ${c.duration||""} (${c.calories}kcal)`).join("; ")||"ยังไม่มี";
  return`[ข้อมูลผู้ใช้ ณ ${fmtDate(d)}]
โปรไฟล์: ${p.gender==="male"?"ชาย":"หญิง"} อายุ ${p.age} สูง ${p.height}cm
ปัจจุบัน: น้ำหนัก ${lb?.weight||p.weight}kg ไขมัน ${lb?.bodyFat!=null?lb.bodyFat+"%":"-"} กล้ามเนื้อ ${lb?.muscleMass||"-"}kg BMR ${t.bmr}
เป้าหมาย: น้ำหนัก ${p.targetWeight||"-"}kg ไขมัน ${p.targetBf||"-"}%
แคลอรี่เป้าหมาย: ${t.cal} kcal (P${t.protein} C${t.carb} F${t.fat}) TDEE ${t.tdee}
วันนี้: กินไป ${tt.c} kcal เผาผลาญจากคาร์ดิโอ ${burn} kcal สุทธิ ${tt.c-burn} kcal (เป้า ${t.cal}) | P${tt.p} C${tt.cb} F${tt.ft}g
มื้อวันนี้: ${todayList}
คาร์ดิโอวันนี้: ${cardioList}
ค่าเฉลี่ย 7 วัน: ${avg} kcal/วัน
แผนวันนี้: ${planLine}`;
}

async function coachSend(text){
  text=(text||"").trim();if(!text)return;
  coachMsgs.push({role:"user",text});
  const inp=document.getElementById("coach-input");if(inp)inp.value="";
  renderCoachUI();
  const body=document.getElementById("chatbody");
  if(body)body.insertAdjacentHTML("beforeend",`<div class="msg ai" id="typing"><div class="avatar" style="width:28px;height:28px;font-size:13px;flex-shrink:0">💬</div><div class="dots"><span></span><span></span><span></span></div></div>`);
  if(body)body.scrollTop=body.scrollHeight;
  const sys=`คุณคือเทรนเนอร์ส่วนตัวมืออาชีพด้านลดไขมัน/ปั้นหุ่น พูดภาษาไทยเป็นกันเองแต่แม่นยำ
ใช้ข้อมูลจริงด้านล่าง ห้ามเดา ตอบกระชับ เป็นขั้นตอน บอกตัวเลขชัดเจน
เมื่อขอปรับแผนอาหาร (งานเลี้ยง/กินเกิน) ให้ใช้ calorie banking และมองค่าเฉลี่ยทั้งสัปดาห์

พื้นฐานการออกกำลังของผู้ใช้: เดินชัน Zone 2 (60-70% max HR) ร่วมกับ weights training เป็นหลักอยู่แล้ว เวลาแนะนำแผนให้ยึดแนวนี้ เว้นแต่ผู้ใช้บอกเงื่อนไขอื่น (เช่น ไม่อยู่บ้าน ทำได้แค่บางอย่าง)

**สำคัญ — เมื่อผู้ใช้ขอให้ปรับ/สร้าง "แผนออกกำลังกาย 7 วัน":**
หลังจากอธิบายแผนด้วยภาษาคนตามปกติแล้ว ให้แนบ block แผนต่อท้ายข้อความในรูปแบบนี้เป๊ะๆ (ผู้ใช้จะเห็นเป็นปุ่ม "บันทึกแผนนี้"):
<PLAN>{"days":[{"day":"วันที่ 1","focus":"...","exercises":[{"name":"...","sets":"...","muscle":"..."}]}, ... ครบ 7 วัน]}</PLAN>
ใส่ <PLAN>...</PLAN> เฉพาะตอนที่ผู้ใช้ขอแผน 7 วันเท่านั้น ถ้าแค่คุยเรื่องอื่นห้ามใส่
${buildContext()}`;
  try{
    coachHistory.push({role:"user",content:text});
    const reply=await callClaude({max_tokens:1500,system:sys,messages:coachHistory.slice(-8)});
    coachHistory.push({role:"assistant",content:reply});
    // แยก <PLAN>...</PLAN> ออกจากข้อความ ถ้ามี
    let cleanText=reply,planObj=null;
    const pm=reply.match(/<PLAN>([\s\S]*?)<\/PLAN>/);
    if(pm){
      cleanText=reply.replace(/<PLAN>[\s\S]*?<\/PLAN>/,"").trim();
      try{const pj=extractJSON(pm[1]);if(pj.days&&Array.isArray(pj.days))planObj=pj;}catch(e){}
    }
    coachMsgs.push({role:"ai",text:cleanText,plan:planObj});
  }catch(e){coachMsgs.push({role:"ai",text:aiError(e)});}
  renderCoachUI();
}

function viewSetup(){
  return`<div class="setup">
    <div class="setup-head">
      <div class="setup-logo">📒</div>
      <div class="setup-ttl">FitLog</div>
      <div class="setup-sub">เทรนเนอร์ส่วนตัวที่จำทุกอย่างให้คุณ — ติดตามอาหาร น้ำหนัก และแผนออกกำลังกาย</div>
    </div>
    <div class="setup-body"><div id="pform"></div></div>
  </div>`;
}
function bindSetup(){
  renderProfileForm(document.getElementById("pform"),null,"เริ่มใช้งาน →",np=>{LS.set(K.profile,np);render();});
}
function renderProfileForm(box,initial,submitLabel,onSave){
  if(!box)return;
  const lb=latestBody();
  const p=initial||{gender:"male",age:"",weight:"",height:"",activity:1.375,goal:"lose",targetWeight:"",targetBf:""};
  let sel={gender:p.gender,goal:p.goal};
  box.innerHTML=`
    <div style="margin-bottom:12px">
      <div class="flbl">เพศ</div>
      <div class="seg" id="pf-g">
        <button data-g="male" class="${p.gender==="male"?"on":""}">ชาย</button>
        <button data-g="female" class="${p.gender==="female"?"on":""}">หญิง</button>
      </div>
    </div>
    <div class="row" style="margin-bottom:12px">
      <div class="field"><div class="flbl">อายุ</div><input id="pf-age" type="number" inputmode="decimal" value="${p.age||""}" placeholder="ปี"></div>
      <div class="field"><div class="flbl">${lb?"น้ำหนัก (เครื่องชั่ง)":"น้ำหนัก (kg)"}</div><input id="pf-w" type="number" inputmode="decimal" value="${lb?lb.weight:(p.weight||"")}" ${lb?"disabled":""} placeholder="kg"></div>
      <div class="field"><div class="flbl">ส่วนสูง (cm)</div><input id="pf-h" type="number" inputmode="decimal" value="${p.height||""}" placeholder="cm"></div>
    </div>
    <div style="margin-bottom:12px">
      <div class="flbl">ระดับกิจกรรม</div>
      <select id="pf-act" style="background:var(--bg3);color:var(--text)">
        ${ACTIVITY.map(a=>`<option value="${a.id}" ${+p.activity===a.id?"selected":""}>${a.label}</option>`).join("")}
      </select>
    </div>
    <div style="margin-bottom:12px">
      <div class="flbl">เป้าหมายหลัก</div>
      <div class="seg" id="pf-goal">
        ${GOALS.map(g=>`<button data-goal="${g.id}" class="${p.goal===g.id?"on":""}">${g.label}</button>`).join("")}
      </div>
    </div>
    <div class="goalbox" style="margin-bottom:14px">
      <div class="gt">🎯 เป้าหมายแบบละเอียด (ตั้งได้ทั้งคู่)</div>
      <div class="row">
        <div class="field"><div class="flbl">น้ำหนักเป้าหมาย (kg)</div><input id="pf-tw" type="number" inputmode="decimal" value="${p.targetWeight||""}"></div>
        <div class="field"><div class="flbl">% ไขมันเป้าหมาย</div><input id="pf-tbf" type="number" inputmode="decimal" value="${p.targetBf||""}"></div>
      </div>
    </div>
    <div class="err" id="pf-err" style="margin-bottom:8px"></div>
    <button class="btn-save" id="pf-submit">${submitLabel}</button>
  `;
  box.querySelectorAll("#pf-g button").forEach(b=>b.onclick=()=>{box.querySelectorAll("#pf-g button").forEach(x=>x.classList.remove("on"));b.classList.add("on");sel.gender=b.dataset.g;});
  box.querySelectorAll("#pf-goal button").forEach(b=>b.onclick=()=>{box.querySelectorAll("#pf-goal button").forEach(x=>x.classList.remove("on"));b.classList.add("on");sel.goal=b.dataset.goal;});
  box.querySelector("#pf-submit").onclick=()=>{
    const age=+box.querySelector("#pf-age").value,height=+box.querySelector("#pf-h").value;
    const weight=lb?lb.weight:+box.querySelector("#pf-w").value;
    if(!age||!height){setErr("pf-err","กรุณากรอกอายุและส่วนสูง");return;}
    if(!lb&&!weight){setErr("pf-err","กรุณากรอกน้ำหนัก");return;}
    onSave({gender:sel.gender,goal:sel.goal,age,height,weight,activity:+box.querySelector("#pf-act").value,targetWeight:+box.querySelector("#pf-tw").value||null,targetBf:+box.querySelector("#pf-tbf").value||null});
  };
}

/* ── utils ── */
let _sheetOverlay=null;
function showSheet(html,fullH){
  closeSheet();
  const o=document.createElement("div");o.className="overlay";o.id="overlay";
  o.innerHTML=`<div class="sheet" id="sheet" style="${fullH?"max-height:96vh;":""}">${html}</div>`;
  o.onclick=e=>{if(e.target===o)closeSheet();};
  document.body.appendChild(o);_sheetOverlay=o;
}
function closeSheet(){const o=document.getElementById("overlay");if(o)o.remove();_sheetOverlay=null;}
function setErr(id,msg){const e=document.getElementById(id);if(e)e.textContent=msg;}
function toast(msg){
  const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),2200);
}
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

render();
</script>
