<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FitLog">
<meta name="theme-color" content="#0E0E16">
<title>FitLog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
:root{
  --bg:#0E0E16;
  --bg2:#16161F;
  --bg3:#1E1E2A;
  --card:#191922;
  --card2:#222230;
  --border:#2A2A3A;
  --text:#F4F4F9;
  --text2:#A0A0BA;
  --text3:#616178;
  --accent:#8B7FF9;
  --accent2:#B4ACFB;
  --accent-bg:rgba(139,127,249,0.14);
  --accent-glow:rgba(139,127,249,0.3);
  --green:#3DDC97;
  --green-bg:rgba(61,220,151,0.14);
  --amber:#FFB443;
  --amber-bg:rgba(255,180,67,0.14);
  --red:#FF6B6B;
  --red-bg:rgba(255,107,107,0.14);
  --teal:#2FD9E8;
  --teal-bg:rgba(47,217,232,0.14);
  --pink:#FF7EB6;
  --pink-bg:rgba(255,126,182,0.14);
  --blue:#4D9BFF;
  --blue-bg:rgba(77,155,255,0.14);
  --r-sm:14px; --r-md:18px; --r-lg:22px; --r-xl:28px;
  --shadow-card:0 4px 20px rgba(0,0,0,0.32);
  --shadow-soft:0 2px 12px rgba(0,0,0,0.22);
}
body{font-family:'Noto Sans Thai',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
#app{max-width:430px;margin:0 auto;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;position:relative;}

/* ── scrollable body ── */
.scroll{flex:1;overflow-y:auto;padding:calc(12px + env(safe-area-inset-top)) 14px calc(100px + 56px + env(safe-area-inset-bottom));}
::-webkit-scrollbar{display:none;}

/* ── date bar — ย้ายไปอยู่ด้านล่างเหนือ tabbar (thumb-friendly) ── */
.datebar{
  position:fixed;bottom:calc(56px + env(safe-area-inset-bottom));left:0;right:0;
  max-width:430px;margin:0 auto;z-index:25;
  background:rgba(14,14,22,0.93);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);border-bottom:none;
  padding:10px 16px;
  display:flex;align-items:center;gap:10px;
}
.navbtn{
  width:44px;height:44px;border-radius:12px;border:1px solid var(--border);
  background:var(--card);color:var(--accent2);font-size:20px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .15s;flex-shrink:0;
}
.navbtn:active{background:var(--card2);}
.navbtn:disabled{opacity:.25;}
.datemid{text-align:center;flex:1;}
.datemid .d{font-size:17px;font-weight:800;color:var(--text);}
.todaychip{
  margin-top:3px;background:var(--accent-bg);border:1px solid rgba(124,111,247,.3);
  color:var(--accent2);font-size:10px;font-weight:700;padding:2px 10px;
  border-radius:20px;cursor:pointer;letter-spacing:.5px;
}
.todaydot{font-size:10px;color:var(--accent);font-weight:700;margin-top:3px;letter-spacing:.5px;}
/* ── mini calendar ── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:8px;}
.cal-wd{font-size:10px;font-weight:700;color:var(--text3);text-align:center;padding:4px 0;}
.cal-day{
  aspect-ratio:1;border-radius:10px;border:none;background:transparent;
  color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:background .12s;
}
.cal-day:hover{background:var(--bg3);}
.cal-day.today{color:var(--accent2);font-weight:800;}
.cal-day.sel{background:var(--accent);color:#fff;font-weight:800;box-shadow:0 2px 10px var(--accent-glow);}
.cal-day.has-data::after{content:"";display:block;width:4px;height:4px;border-radius:50%;background:var(--green);position:absolute;bottom:4px;left:50%;transform:translateX(-50%);}
.cal-day.has-data{position:relative;}
.cal-day.empty{cursor:default;opacity:0;}
.cal-day.future{opacity:.3;cursor:not-allowed;}
.cal-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.cal-nav button{background:var(--bg3);border:1px solid var(--border);border-radius:10px;width:34px;height:34px;color:var(--text2);font-size:16px;cursor:pointer;}
.cal-nav .cal-month{font-size:15px;font-weight:800;color:var(--text);}

/* ── cards ── */
.card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);
  padding:16px;margin-bottom:12px;box-shadow:var(--shadow-card);
}
.card-glow{box-shadow:0 0 0 1px var(--accent-glow),0 8px 32px rgba(0,0,0,.4);}
.lbl{font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:1px;}
.num{font-variant-numeric:tabular-nums;}

/* ── icon frame (Soom-style rounded colored icon) ── */
.icf{
  width:38px;height:38px;border-radius:12px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:19px;
}
.icf-accent{background:var(--accent-bg);}
.icf-green{background:var(--green-bg);}
.icf-amber{background:var(--amber-bg);}
.icf-red{background:var(--red-bg);}
.icf-teal{background:var(--teal-bg);}
.icf-pink{background:var(--pink-bg);}
.icf-blue{background:var(--blue-bg);}

/* ── progress bar ── */
.bartrack{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:14px;}
.barfill{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1);}

/* ── meal card ── */
.mealcard{
  background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);
  padding:14px 16px;margin-bottom:10px;
}
.mealhead{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.mealhead .mname{font-weight:700;font-size:14px;}
.mealhead .mcal{font-size:11px;color:var(--text2);}
.addbtn{
  margin-left:auto;background:var(--accent-bg);border:1px solid rgba(124,111,247,.25);
  color:var(--accent2);font-size:11px;font-weight:700;padding:5px 12px;
  border-radius:20px;cursor:pointer;letter-spacing:.3px;
}
.foodrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--border);}
.foodrow .fn{font-size:13px;font-weight:500;color:var(--text);}
.foodrow .meta{font-size:11px;color:var(--text3);margin-top:1px;}
.foodrow .fcal{font-size:12px;font-weight:700;color:var(--text2);}
.delbtn{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:0 4px;line-height:1;}
.empty{font-size:12px;color:var(--text3);padding:4px 0 2px;}

/* ── stat boxes ── */
.statrow{display:flex;gap:8px;flex-wrap:wrap;}
.stat{
  flex:1;min-width:76px;background:var(--bg3);border:1px solid transparent;
  border-radius:var(--r-md);padding:13px 12px;text-align:center;
}
.stat.hl{background:var(--accent-bg);border-color:rgba(139,127,249,.2);}
.stat .sl{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.stat .sv{font-size:21px;font-weight:800;color:var(--text);margin:2px 0 1px;}
.stat.hl .sv{color:var(--accent2);}
.stat .su{font-size:10px;color:var(--text3);}

/* ── macro bars ── */
.macro{flex:1;}
.macro .top{display:flex;justify-content:space-between;margin-bottom:4px;}
.macro .ml{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.macro .mv{font-size:10px;color:var(--text2);}
.macro .mt{height:4px;background:var(--bg3);border-radius:2px;}
.macro .mf{height:100%;border-radius:2px;transition:width .4s;}

/* ── forms ── */
.field{flex:1;}
.flbl{font-size:11px;color:var(--text2);margin-bottom:5px;font-weight:600;letter-spacing:.3px;}
input,select{
  width:100%;padding:11px 13px;
  background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-sm);
  font-size:14px;font-family:inherit;outline:none;color:var(--text);
  -webkit-appearance:none;appearance:none;
  transition:border-color .2s;
}
input:focus,select:focus{border-color:var(--accent);}
input:disabled{opacity:.5;cursor:not-allowed;}
input::placeholder{color:var(--text3);}
.row{display:flex;gap:8px;}

/* ── segments ── */
.seg{display:flex;gap:4px;background:var(--bg3);padding:3px;border-radius:var(--r-sm);border:1px solid var(--border);}
.seg button{
  flex:1;padding:8px 4px;border:none;border-radius:9px;
  background:none;color:var(--text3);font-weight:600;font-size:12px;
  cursor:pointer;font-family:inherit;transition:all .2s;
}
.seg button.on{
  background:var(--accent);color:#fff;font-weight:800;
  box-shadow:0 2px 8px var(--accent-glow);
}

/* ── buttons ── */
.btn{
  border:none;border-radius:var(--r-sm);padding:10px 18px;
  font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;
  transition:all .15s;
}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 4px 14px var(--accent-glow);}
.btn-primary:active{transform:scale(.97);}
.btn-ghost{background:var(--bg3);color:var(--text2);border:1px solid var(--border);}
.btn-ghost:active{background:var(--card2);}
.btn-save{
  width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;
  border:none;border-radius:var(--r-md);padding:15px;
  font-weight:800;font-size:15px;cursor:pointer;font-family:inherit;margin-top:6px;
  box-shadow:0 4px 20px var(--accent-glow);transition:all .2s;
}
.btn-save:active{transform:scale(.98);}
.btn-block{width:100%;}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid rgba(248,113,113,.25);}

/* ── image picker ── */
.img-opts{display:flex;gap:8px;margin-bottom:12px;}
.imgbtn{
  flex:1;padding:18px 0;border:1px dashed var(--border);border-radius:var(--r-md);
  background:var(--bg3);display:flex;flex-direction:column;align-items:center;
  cursor:pointer;gap:6px;transition:border-color .2s;
}
.imgbtn:hover{border-color:var(--accent);}
.imgbtn .ic2{font-size:26px;}
.imgbtn .tx{font-size:11px;color:var(--text2);font-weight:600;}

/* ── badges/chips ── */
.chip{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--bg3);border:1px solid var(--border);border-radius:10px;
  padding:6px 10px;font-size:12px;cursor:pointer;margin:0 5px 5px 0;
}
.chip .cc{font-size:10px;color:var(--text3);}
.chip:hover{border-color:var(--accent);}
.warn{font-size:12px;color:var(--amber);background:var(--amber-bg);border:1px solid rgba(251,191,36,.2);border-radius:var(--r-sm);padding:10px 12px;line-height:1.5;}
.note{font-size:12px;color:var(--accent2);background:var(--accent-bg);border:1px solid rgba(124,111,247,.2);border-radius:var(--r-sm);padding:10px 12px;line-height:1.5;}
.err{color:var(--red);font-size:12px;padding:2px 0;}
.success{color:var(--green);font-size:12px;}

/* ── goal bar ── */
.goalbar{margin-bottom:14px;}
.goalbar .top{display:flex;justify-content:space-between;margin-bottom:5px;}
.goalbar .gl{font-size:13px;font-weight:600;}
.goalbar .gv{font-size:11px;color:var(--text2);}
.goalbar .track{height:7px;background:var(--bg3);border-radius:4px;overflow:hidden;}
.goalbar .fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--teal));border-radius:4px;}
.goalbar .gpct{font-size:10px;color:var(--text3);margin-top:3px;}

/* ── chart ── */
.chart{display:flex;align-items:flex-end;gap:3px;height:120px;}
.chart .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.chart .cv{font-size:8px;color:var(--text3);}
.chart .cb{width:100%;border-radius:3px 3px 0 0;}
.chart .cd{font-size:7px;color:var(--text3);}

/* ── tabbar ── */
.tabbar{
  position:fixed;bottom:0;left:0;right:0;max-width:430px;margin:0 auto;
  background:rgba(14,14,22,0.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  display:flex;padding:8px 0 calc(8px + env(safe-area-inset-bottom));z-index:30;
}
.tabbar button{
  flex:1;background:none;border:none;cursor:pointer;padding:6px 0;
  display:flex;flex-direction:column;align-items:center;gap:3px;
}
.tabbar .ic{font-size:22px;transition:transform .2s;}
.tabbar .tl{font-size:9px;font-weight:600;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;}
.tabbar button.on .ic{transform:scale(1.1);}
.tabbar button.on .tl{color:var(--accent2);}

/* ── coach fab ── */
.fab{
  position:fixed;bottom:calc(56px + 56px + 12px + env(safe-area-inset-bottom));right:14px;
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;color:#fff;font-size:22px;cursor:pointer;
  box-shadow:0 8px 24px var(--accent-glow);z-index:40;
  display:flex;align-items:center;justify-content:center;
  transition:transform .2s;
}
.fab:active{transform:scale(.94);}
@media(min-width:458px){.fab{right:calc(50% - 215px + 14px);}}

/* ── overlay / sheet ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:flex-end;justify-content:center;z-index:100;backdrop-filter:blur(4px);}
.sheet{
  background:var(--bg2);width:100%;max-width:430px;
  border-radius:24px 24px 0 0;padding:12px 18px 32px;
  max-height:92vh;overflow-y:auto;
  animation:slideUp .28s cubic-bezier(.16,1,.3,1);
  border-top:1px solid var(--border);
}
.handle{width:36px;height:3px;background:var(--border);border-radius:2px;margin:0 auto 16px;}
.sheetTitle{font-weight:800;font-size:17px;color:var(--text);margin-bottom:2px;}
.sheetSub{font-size:12px;color:var(--text3);margin-bottom:16px;}

@keyframes slideUp{from{transform:translateY(100%);opacity:.5}to{transform:translateY(0);opacity:1}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{0%{transform:scale(.7);opacity:0}100%{transform:scale(1);opacity:1}}

/* ── coach chat ── */
.chatwrap{display:flex;flex-direction:column;height:88vh;}
.chathead{
  display:flex;align-items:center;gap:10px;
  padding-bottom:12px;border-bottom:1px solid var(--border);
  margin-bottom:12px;
}
.avatar{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;
}
.chatbody{flex:1;overflow-y:auto;padding:2px 0;display:flex;flex-direction:column;gap:10px;}
.msg{display:flex;gap:8px;animation:fadeIn .2s ease;}
.msg.user{flex-direction:row-reverse;}
.bubble{
  max-width:82%;padding:10px 14px;font-size:13.5px;line-height:1.6;white-space:pre-wrap;
  border-radius:var(--r-lg);
}
.msg.ai .bubble{background:var(--card2);color:var(--text);border-radius:4px var(--r-lg) var(--r-lg) var(--r-lg);}
.msg.user .bubble{background:var(--accent);color:#fff;border-radius:var(--r-lg) 4px var(--r-lg) var(--r-lg);}
.quick{display:flex;gap:6px;flex-wrap:wrap;padding:8px 0;}
.quick button{
  background:var(--card);border:1px solid var(--border);border-radius:20px;
  padding:7px 12px;font-size:12px;color:var(--text2);cursor:pointer;font-family:inherit;
  transition:all .15s;
}
.quick button:hover{border-color:var(--accent);color:var(--accent2);}
.chatinput{display:flex;gap:8px;padding-top:10px;border-top:1px solid var(--border);}
.chatinput input{border-radius:20px;background:var(--card);}
.sendbtn{
  width:42px;height:42px;border-radius:50%;border:none;
  background:var(--accent);color:#fff;font-size:16px;cursor:pointer;flex-shrink:0;
  box-shadow:0 4px 12px var(--accent-glow);transition:all .15s;
}
.sendbtn:disabled{background:var(--bg3);box-shadow:none;}
.dots{display:flex;gap:4px;padding:12px 14px;background:var(--card2);border-radius:4px var(--r-lg) var(--r-lg) var(--r-lg);}
.dots span{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:bounce 1.2s infinite;}
.dots span:nth-child(2){animation-delay:.2s;}.dots span:nth-child(3){animation-delay:.4s;}

/* ── setup ── */
.setup{min-height:100vh;display:flex;flex-direction:column;}
.setup-head{
  padding:calc(48px + env(safe-area-inset-top)) 24px 24px;
  background:linear-gradient(180deg,rgba(124,111,247,.08) 0%,transparent 100%);
}
.setup-logo{font-size:48px;margin-bottom:12px;}
.setup-ttl{font-size:28px;font-weight:900;background:linear-gradient(135deg,#fff,var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.setup-sub{font-size:14px;color:var(--text2);margin-top:6px;line-height:1.5;}
.setup-body{flex:1;overflow-y:auto;padding:0 16px 40px;}
.goalbox{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-md);padding:14px;margin-top:4px;}
.goalbox .gt{font-size:11px;color:var(--accent2);font-weight:700;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px;}

/* ── hint empty ── */
.hint{text-align:center;padding:48px 20px;color:var(--text3);}
.hint .ic{font-size:44px;margin-bottom:10px;opacity:.6;}
.hint .ht{font-size:14px;color:var(--text2);}
.hint .hs{font-size:12px;color:var(--text3);margin-top:4px;}

/* ── toast ── */
.toast{
  position:fixed;bottom:110px;left:50%;transform:translateX(-50%);
  background:var(--card2);border:1px solid var(--border);color:var(--text);
  padding:10px 18px;border-radius:20px;font-size:13px;z-index:200;
  opacity:0;transition:opacity .25s;pointer-events:none;
  box-shadow:0 8px 24px rgba(0,0,0,.5);white-space:nowrap;
}
.toast.show{opacity:1;}

/* ── key status ── */
.keystatus{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;letter-spacing:.3px;}
.keystatus.ok{color:var(--green);}.keystatus.no{color:var(--red);}

/* ── workout ── */
.daycard{
  background:linear-gradient(135deg,var(--accent-bg),var(--teal-bg));
  border:1px solid rgba(124,111,247,.2);border-radius:var(--r-lg);padding:16px;
  margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;
}
.exrow{
  display:flex;align-items:center;gap:10px;padding:10px 0;
  border-top:1px solid var(--border);transition:opacity .2s;
}
.excheck{
  width:26px;height:26px;border-radius:8px;border:2px solid var(--border);
  background:none;color:#fff;cursor:pointer;font-size:13px;
  flex-shrink:0;transition:all .2s;display:flex;align-items:center;justify-content:center;
}
.excheck.done{background:var(--green);border-color:var(--green);}

/* ── section header ── */
.sechead{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.scanBtn{
  background:var(--accent);border:none;color:#fff;
  font-size:11px;font-weight:700;padding:6px 12px;border-radius:20px;cursor:pointer;
  letter-spacing:.3px;box-shadow:0 4px 10px var(--accent-glow);
}
h3{font-size:15px;font-weight:700;color:var(--text);}
.small{font-size:11px;color:var(--text3);line-height:1.5;}
.divider{height:1px;background:var(--border);margin:14px 0;}
.sLabel{
  font-size:10px;font-weight:700;color:var(--text3);
  text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;
}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>
<script>
/* ============================================================
   FitLog v3 — Dark Edition
   - แก้ JSON parse error (workout plan)
   - รูปจาก library + กล้อง

function mifflin(p,w){return p.gender==="male"?10*w+6.25*p.height-5*p.age+5:10*w+6.25*p.height-5*p.age-161;}

/* รวมค่าล่าสุดของแต่ละ field — ถ้าวันล่าสุดบางค่าว่าง ย้อนดึงจาก record ก่อนหน้าที่มีค่า */
function latestBodyMerged(){
  const b=LS.get(K.body,[]);
  if(!b.length)return null;
  const sorted=[...b].sort((a,c)=>a.date<c.date?1:-1);
  const fields=["weight","bmi","bodyFat","fatMass","muscleMass","skeletalMuscle","bmr","heartRate","waterPct","proteinPct","visceralFat","subcutaneousFat","boneMass","metabolicAge"];
  const merged={date:sorted[0].date,_dates:{}};
  fields.forEach(f=>{
    for(const rec of sorted){
      if(rec[f]!=null){merged[f]=rec[f];merged._dates[f]=rec.date;break;}
    }
  });
  return merged;
}
/* ประเมินแคลจากเวท: MET 5.0 (vigorous weight training) × น้ำหนัก(kg) × เวลา(ชม.)
   เวลาประเมินจากจำนวนเซ็ตรวม (~3 นาที/เซ็ต รวมพัก) ถ้าหาเซ็ตไม่ได้ใช้ ~4 นาที/ท่า */
function estimateWeightKcal(exercises,checkedNames,bodyWeight){
  const MET=5.0,w=bodyWeight||70;
  let totalMin=0;
  exercises.forEach(ex=>{
    if(!checkedNames.includes(ex.name))return;
    const m=(ex.muscle||"").toLowerCase(),n=(ex.name||"").toLowerCase();
    // ข้ามท่าคาร์ดิโอ (นาฬิกาวัดแยกแล้ว)
    if(/cardio|คาร์ดิโอ|เดิน|วิ่ง|ปั่น|ว่าย|zone 2|treadmill|run|walk|cycl|row machine/.test(m+" "+n))return;
    // หาจำนวนเซ็ตจาก sets เช่น "4x10" → 4 เซ็ต
    const setMatch=(ex.sets||"").match(/(\d+)\s*[xX×]/);
    const sets=setMatch?+setMatch[1]:0;
    totalMin+=sets>0?sets*3:4; // 3 นาที/เซ็ต (รวมพัก) หรือ 4 นาที/ท่าถ้าไม่รู้เซ็ต
  });
  if(totalMin<=0)return{kcal:0,min:0};
  const kcal=Math.round(MET*w*(totalMin/60));
  return{kcal,min:totalMin};
}
/* คำนวน HR zone ด้วย Karvonen (ใช้ resting HR ล่าสุดจากเครื่องชั่ง ถ้าไม่มีใช้ 60) */
function hrZone(age,restingHR){
  if(!age)return null;
  const rest=restingHR||60;
  const maxHR=220-age;
  const hrr=maxHR-rest;
  const z=(lo,hi)=>({min:Math.round(hrr*lo+rest),max:Math.round(hrr*hi+rest)});
  return{
    maxHR,rest,usedDefault:!restingHR,
    zones:[
      {n:1,name:"Recovery",th:"ฟื้นตัว",...z(0.5,0.6),color:"var(--teal)"},
      {n:2,name:"Endurance",th:"เดินชัน/Zone 2",...z(0.6,0.7),color:"var(--green)"},
      {n:3,name:"Aerobic",th:"คาร์ดิโอต่อเนื่อง",...z(0.7,0.8),color:"var(--amber)"},
      {n:4,name:"Threshold",th:"วิ่งแรง/HIIT",...z(0.8,0.9),color:"var(--red)"},
      {n:5,name:"Max",th:"สปรินต์สุดแรง",...z(0.9,1.0),color:"var(--accent2)"},
    ]
  };
}
function computeTargets(p,body){
  const w=body?.weight??p.weight??70;
  const bmr=Math.round(body?.bmr??mifflin(p,w));
  const tdee=Math.round(bmr*(p.activity||1.375));
  const bf=body?.bodyFat??null;
  const lean=bf?w*(1-bf/100):w*0.78;
  const dir=p.targetWeight?(p.targetWeight<w?"lose":p.targetWeight>w?"gain":"maintain"):"lose";
  let cal=dir==="lose"?tdee-500:dir==="gain"?tdee+250:tdee;
  cal=Math.max(1200,Math.round(cal));
  const protein=Math.round(lean*2.4);
  const fat=Math.round(cal*0.25/9);
  const carb=Math.max(0,Math.round((cal-protein*4-fat*9)/4));
  return{bmr,tdee,cal,protein,carb,fat,lean:Math.round(lean*10)/10,bf};
}
/* ดึงเป้าแคลอรี่เฉพาะวัน (calorie banking) ถ้ามี ไม่งั้น fallback */
function dayTarget(date,baseTargets){
  const o=LS.get(K.dcal(date),null);
  if(o&&typeof o.cal==="number")return{cal:o.cal,note:o.note||null,banked:true};
  return{cal:baseTargets.cal,note:null,banked:false};
}

function impliedWeight(body,tbf){
  if(!body?.bodyFat||!tbf)return null;
  const lean=body.weight*(1-body.bodyFat/100);
  return Math.round(lean/(1-tbf/100)*10)/10;
}

function getKey(){return LS.get(K.key,"")||"";}
async function callClaude({system,messages,max_tokens=1200}){
  const key=getKey();
  if(!key)throw new Error("NO_KEY");
  let res;
  try{
    res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"content-type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:MODEL,max_tokens,...(system?{system}:{}),messages})
    });
  }catch(netErr){
    throw new Error("NETWORK:"+(netErr.message||netErr));
  }
  if(!res.ok){
    const t=await res.text();
    let detail=t;
    try{const j=JSON.parse(t);detail=(j.error&&(j.error.message||j.error.type))||t;}catch(_){}
    throw new Error(res.status+": "+String(detail).slice(0,200));
  }
  const data=await res.json();
  const out=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
  if(!out)throw new Error("EMPTY: API ตอบกลับแต่ไม่มีข้อความ (stop_reason: "+(data.stop_reason||"?")+")");
  return out;
}

/* ── robust JSON parser (แก้ bug หลัก) ── */
function extractJSON(txt){
  // ลอง extract JSON จาก ```json ... ``` ก่อน
  const fence=txt.match(/```(?:json)?\s*([\s\S]*?)```/);
  if(fence)txt=fence[1];
  txt=txt.trim();
  // หาก block เริ่มด้วย { หรือ [
  const start=txt.search(/[{\[]/);
  if(start>0)txt=txt.slice(start);
  // ตัด trailing text หลัง JSON จบ
  let depth=0,end=0,inStr=false,esc=false;
  for(let i=0;i<txt.length;i++){
    const c=txt[i];
    if(esc){esc=false;continue;}
    if(c==="\\"&&inStr){esc=true;continue;}
    if(c==='"')inStr=!inStr;
    if(!inStr){
      if(c==="{"||c==="[")depth++;
      if(c==="}"||c==="]"){depth--;if(depth===0){end=i+1;break;}}
    }
  }
  if(end>0)txt=txt.slice(0,end);
  return JSON.parse(txt);
}

function aiError(e){
  const m=String(e.message||e);
  if(m.includes("NO_KEY"))return"⚠️ ยังไม่ได้ใส่ API key (ไปที่ เพิ่มเติม → 🔑 API Key)";
  if(m.startsWith("NETWORK:"))return"⚠️ เชื่อมต่อ API ไม่ได้ (network/CORS) — เช็คเน็ต หรือลองเปิดในเบราว์เซอร์: "+m.slice(8,90);
  if(m.startsWith("EMPTY:"))return"⚠️ "+m.slice(6);
  if(m.startsWith("PARSE:"))return"⚠️ "+m.slice(6);
  if(m.includes("401")||m.includes("authentication"))return"⚠️ API key ไม่ถูกต้อง";
  if(m.includes("429")||m.includes("rate_limit"))return"⚠️ เครดิตหมด หรือถึง rate limit";
  if(m.includes("404")||m.includes("not_found")||m.includes("model:"))return"⚠️ ชื่อโมเดลไม่ถูกต้อง: "+m.slice(0,120);
  if(m.includes("529")||m.includes("overloaded"))return"⚠️ เซิร์ฟเวอร์ AI โหลดหนัก ลองใหม่อีกครั้ง";
  if(m.includes("400"))return"⚠️ คำขอผิดพลาด: "+m.slice(0,140);
  return"⚠️ "+m.slice(0,150);
}

  function calHTML(){
    const [y,m]=view.split("-").map(Number);

    for(let d=1;d<=days;d++){
      const ds=`${view}-${String(d).padStart(2,"0")}`;

      const dot=hasDots.has(ds)&&!isSel;
      grid+=`<button class="cal-day${isSel?" sel":isTod?" today":""}${isFut?" future":""}${dot?" has-data":""}" data-ds="${ds}" ${isFut?"disabled":""}>${d}</button>`;
    }
    return`<div class="cal-nav">
      <button id="cal-pm">‹</button>
      <div class="cal-month">${MONTHS[m-1]} ${y}</div>
      <button id="cal-nm" ${view>=today.slice(0,7)?"disabled":""}>›</button>
    </div>
    <div class="cal-grid">${WD.map(w=>`<div class="cal-wd">${w}</div>`).join("")}${grid}</div>`;
  }
  showSheet(`
    <div class="handle"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div class="sheetTitle">เลือกวันที่</div>

    <div class="small" style="margin-bottom:12px">🟢 = มีข้อมูล</div>
    <div id="cal-body">${calHTML()}</div>
  `);

    const pm=document.getElementById("cal-pm");if(pm)pm.onclick=()=>{const[y,m]=view.split("-").map(Number);view=m===1?`${y-1}-12`:`${y}-${String(m-1).padStart(2,"0")}`;document.getElementById("cal-body").innerHTML=calHTML();bindCal();};
    const nm=document.getElementById("cal-nm");if(nm)nm.onclick=()=>{const[y,m]=view.split("-").map(Number);view=m===12?`${y+1}-01`:`${y}-${String(m+1).padStart(2,"0")}`;document.getElementById("cal-body").innerHTML=calHTML();bindCal();};
    document.querySelectorAll(".cal-day[data-ds]:not([disabled])").forEach(b=>b.onclick=()=>{state.date=b.dataset.ds;closeSheet();render();});
    const ct=document.getElementById("cal-today-btn");if(ct)ct.onclick=()=>{state.date=today;closeSheet();render();};
  }

}

/* ══════════════════════════════
   INSIGHT SYSTEM (rule-based + AI เสริม)
══════════════════════════════ */
function getInsights(scope){
  // scope: "home" | "food" | "workout"
  const p=LS.get(K.profile,null);if(!p)return[];
  const d=state.date,ins=[];
  const base=computeTargets(p,latestBody());
  const dt=dayTarget(d,base);
  const food=LS.get(K.food(d),[]);
  const eaten=food.reduce((a,f)=>a+f.cal,0);
  const protein=food.reduce((a,f)=>a+(f.protein||0),0);
  const cardio=LS.get(K.cardio(d),[]);
  const burn=cardio.reduce((a,c)=>a+(c.calories||0),0);
  const net=eaten-burn;
  const lb=latestBodyMerged();
  const bmr=lb?.bmr||base.bmr;

  if(scope==="home"||scope==="food"){
    // Deficit สูงเกิน (กินสุทธิต่ำกว่า BMR มาก)
    if(eaten>0&&net<bmr-100&&net>0){
      ins.push({t:"warn",ic:"🔥",title:"Deficit สูงเกินไป",msg:`กินสุทธิ ${net} kcal ต่ำกว่า BMR (${bmr}) — เสี่ยงสูญกล้ามเนื้อ ควรกินเพิ่ม`});
    }
    // เกินเป้า
    else if(eaten>dt.cal+50){
      ins.push({t:"amber",ic:"⚠️",title:"เกินเป้าแคลอรี่",msg:`วันนี้กิน ${eaten}/${dt.cal} kcal — ลองลดมื้อถัดไป หรือเพิ่มคาร์ดิโอ`});
    }
    // อยู่ใน deficit ที่ดี
    else if(eaten>0&&net>=bmr-100&&net<=dt.cal){
      ins.push({t:"green",ic:"✅",title:"Deficit กำลังดี",msg:`สุทธิ ${net} kcal อยู่ในโซนลดไขมันที่ปลอดภัย รักษาไว้!`});
    }
    // โปรตีนขาด (ถ้ากินไปแล้วเกินครึ่งเป้าแคล แต่โปรตีนยังต่ำ)
    if(eaten>dt.cal*0.4&&protein<base.protein*0.5){
      ins.push({t:"accent",ic:"🥩",title:"โปรตีนยังขาด",msg:`ได้ ${protein}/${base.protein}g — เพิ่มไก่/ไข่/เวย์ในมื้อถัดไปเพื่อรักษากล้ามเนื้อ`});
    }
    // น้ำน้อย
    const water=LS.get(K.water(d),0);
    if(isToday(d)&&new Date().getHours()>=18&&water<6){
      ins.push({t:"blue",ic:"💧",title:"ดื่มน้ำน้อยไป",msg:`วันนี้ ${water}/8 แก้ว — ดื่มเพิ่มอีก ${8-water} แก้วก่อนนอน`});
    }
  }

  if(scope==="food"){
    const sugar=food.reduce((a,f)=>a+(f.sugar||0),0);
    const sodium=food.reduce((a,f)=>a+(f.sodium||0),0);
    const fiber=food.reduce((a,f)=>a+(f.fiber||0),0);
    if(sugar>50)ins.push({t:"warn",ic:"🍬",title:"น้ำตาลเกินเกณฑ์",msg:`วันนี้ ${sugar}g (แนะนำ <50g) — ระวังของหวาน/เครื่องดื่ม`});
    if(sodium>2000)ins.push({t:"warn",ic:"🧂",title:"โซเดียมสูง",msg:`${sodium}mg (แนะนำ <2000mg) — ลดอาหารเค็ม/แปรรูป`});
    if(eaten>dt.cal*0.5&&fiber<15)ins.push({t:"green",ic:"🌾",title:"ไฟเบอร์ยังน้อย",msg:`ได้ ${fiber}g — เพิ่มผัก ผลไม้ ธัญพืชเต็มเมล็ด`});
  }

  if(scope==="workout"){
    // ไม่มีคาร์ดิโอหลายวัน
    let noCardioDays=0;
    for(let i=0;i<5;i++){const dd=addDays(d,-i);if((LS.get(K.cardio(dd),[])).length)break;noCardioDays++;}
    if(noCardioDays>=3)ins.push({t:"amber",ic:"🏃",title:`ไม่มีคาร์ดิโอ ${noCardioDays} วัน`,msg:"เพิ่ม Zone 2 สัก 30-45 นาที ช่วยเผาไขมันและหัวใจแข็งแรง"});
    // ออกกำลังทุกวันไม่พัก
    let streak=0;
    for(let i=0;i<8;i++){const dd=addDays(d,-i);if((LS.get(K.workout(dd),[])).length||(LS.get(K.cardio(dd),[])).length)streak++;else break;}
    if(streak>=7)ins.push({t:"amber",ic:"😴",title:`ออกกำลัง ${streak} วันติด`,msg:"ควรมีวันพักบ้าง ให้กล้ามเนื้อฟื้นตัว เลี่ยง overtraining"});
    else if(streak>=3)ins.push({t:"green",ic:"🔥",title:`Streak ${streak} วัน!`,msg:"ความสม่ำเสมอเยี่ยมมาก ทำต่อไป!"});
  }

  return ins;
}

function insightCard(scope){
  const ins=getInsights(scope);
  if(!ins.length)return"";
  const cmap={warn:"red",amber:"amber",green:"green",accent:"accent",blue:"blue"};
  return ins.map(x=>{
    const c=cmap[x.t]||"accent";
    return`<div class="card" style="border-left:3px solid var(--${c==="red"?"red":c})">
      <div style="display:flex;gap:11px;align-items:flex-start">
        <div class="icf icf-${c}" style="width:34px;height:34px">${x.ic}</div>
        <div style="flex:1;min-width:0">
          <div class="lbl" style="margin-bottom:3px;color:var(--${c==="red"?"red":c})">INSIGHT</div>
          <div style="font-size:14px;font-weight:800;color:var(--text);margin-bottom:2px">${esc(x.title)}</div>
          <div style="font-size:12px;color:var(--text2);line-height:1.5">${esc(x.msg)}</div>
        </div>
      </div>
    </div>`;
  }).join("");
}

function viewHome(){
  const p=LS.get(K.profile,null),base=computeTargets(p,latestBody()),lb=latestBody();
  const dt=dayTarget(state.date,base);
  const t={...base,cal:dt.cal};
  const food=LS.get(K.food(state.date),[]);
  const eaten=food.reduce((a,f)=>a+f.cal,0);
  const remain=t.cal-eaten;

  // ค่าที่ใช้วาด avatar (ใช้ค่า merged เพื่อ backfill %ไขมันถ้าวันล่าสุดชั่งไม่ติด)
  const mb=latestBodyMerged();
  const weight=mb?.weight??p.weight;
  const bf=mb?.bodyFat??null;
  const heightM=(p.height||170)/100;
  const bmi=weight/(heightM*heightM);

  let h=`<div style="text-align:center;padding:8px 0 4px">
    <div class="lbl" style="margin-bottom:2px">${isToday(state.date)?"สวัสดี":"ดูข้อมูลย้อนหลัง"} · ${fmtDate(state.date)}</div>
  </div>`;

  // ── Body Avatar card ──
  h+=`<div class="card card-glow" style="text-align:center;padding:20px 16px">
    ${bodyAvatarSVG(weight,bf,bmi,p.gender)}
    <div style="margin-top:6px">${bodyStatus(bf,bmi,p.gender)}</div>
    <div class="statrow" style="margin-top:16px">
      ${stat("น้ำหนัก",weight??"–","kg",true)}
      ${bf!=null?stat("ไขมัน",bf,"%",true):stat("ไขมัน","–","%")}
      ${lb?.muscleMass!=null?stat("กล้ามเนื้อ",lb.muscleMass,"kg"):stat("BMI",bmi?bmi.toFixed(1):"–","")}
    </div>
  </div>`;

  // ── Insight ประจำวัน ──
  h+=insightCard("home");

  // ── ค่าร่างกายล่าสุด (ดึงค่าล่าสุดที่มีของแต่ละค่า) ──
  const m=latestBodyMerged();
  if(m){
    const bmiCalc=m.bmi??(weight&&heightM?+(weight/(heightM*heightM)).toFixed(1):null);
    const cells=[
      {lbl:"ไขมัน",v:m.bodyFat,u:"%",ic:"🔥",c:"red"},
      {lbl:"กล้ามเนื้อ",v:m.muscleMass,u:"kg",ic:"💪",c:"accent"},
      {lbl:"มวลไขมัน",v:m.fatMass,u:"kg",ic:"🧈",c:"amber"},
      {lbl:"BMI",v:bmiCalc,u:"",ic:"📊",c:"blue"},
      {lbl:"BMR",v:m.bmr,u:"",ic:"⚡",c:"teal"},
      {lbl:"น้ำ",v:m.waterPct,u:"%",ic:"💧",c:"blue"},
      {lbl:"ชีพจร",v:m.heartRate,u:"bpm",ic:"❤️",c:"pink"},
      {lbl:"ไขมันช่องท้อง",v:m.visceralFat,u:"",ic:"🎯",c:"amber"},
    ].filter(c=>c.v!=null);
    if(cells.length){
      h+=`<div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
          <div class="lbl">ค่าร่างกายล่าสุด</div>
          <button class="btn btn-ghost" id="go-body2" style="width:auto;padding:5px 13px;font-size:11px">ดูทั้งหมด →</button>
        </div>
        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:9px">
          ${cells.map(c=>`<div style="display:flex;align-items:center;gap:10px;background:var(--bg3);border-radius:var(--r-md);padding:11px 12px">
            <div class="icf icf-${c.c}">${c.ic}</div>
            <div style="min-width:0">
              <div style="font-size:18px;font-weight:800;color:var(--text);line-height:1.1">${c.v}<span style="font-size:10px;color:var(--text3);font-weight:600;margin-left:1px">${c.u}</span></div>
              <div style="font-size:10px;color:var(--text3);margin-top:1px">${c.lbl}</div>
            </div>
          </div>`).join("")}
        </div>
      </div>`;
    }
  }

  // ── เป้าหมายความคืบหน้า ──
  if(lb&&(p.targetWeight||p.targetBf)){
    h+=`<div class="card"><div class="lbl" style="margin-bottom:12px">ความคืบหน้าสู่เป้าหมาย</div>`;
    const body=LS.get(K.body,[]).sort((a,b)=>a.date<b.date?-1:1),first=body[0];
    if(p.targetWeight)h+=goalBar("น้ำหนัก",first?.weight,lb.weight,p.targetWeight,"kg");
    if(p.targetBf&&lb.bodyFat!=null)h+=goalBar("% ไขมัน",first?.bodyFat,lb.bodyFat,p.targetBf,"%");
    h+=`</div>`;
  }

  // ── สรุปวันนี้ (hero card) ──
  const cardioToday=LS.get(K.cardio(state.date),[]);
  const burn=cardioToday.reduce((a,c)=>a+(c.calories||0),0);
  const net=eaten-burn;
  const pct=Math.min(100,eaten/t.cal*100);
  const sc=eaten>t.cal?"var(--red)":pct>85?"var(--amber)":"var(--green)";
  const remainReal=t.cal-net;
  h+=`<div class="card" style="background:linear-gradient(150deg,rgba(139,127,249,0.16),rgba(47,217,232,0.06) 55%,var(--card));border-color:rgba(139,127,249,0.22)">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="icf icf-green" style="width:34px;height:34px">⚡</div>
        <div>
          <div style="font-size:13px;font-weight:800;color:var(--text)">${isToday(state.date)?"พลังงานวันนี้":"พลังงาน · "+fmtDate(state.date)}</div>
          <div style="font-size:10px;color:var(--text2)">${isToday(state.date)?"Real-time":"ข้อมูลย้อนหลัง"}</div>
        </div>
      </div>
      ${dt.banked?`<span style="font-size:10px;font-weight:700;color:var(--accent2);background:var(--accent-bg);padding:4px 10px;border-radius:11px">🏦 ปรับโดยแผน</span>`:""}
    </div>
    <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:12px">
      <div>
        <div style="font-size:34px;font-weight:900;color:${remainReal>=0?"var(--green)":"var(--red)"};line-height:1">${Math.abs(remainReal)}</div>
        <div style="font-size:11px;color:var(--text2);margin-top:3px;font-weight:600">${remainReal>=0?"เหลือกินได้ kcal":"เกินเป้า kcal"}</div>
      </div>
      <button class="btn btn-primary" id="go-food">+ บันทึกอาหาร</button>
    </div>
    <div class="bartrack" style="margin-top:0;height:8px"><div class="barfill" style="width:${pct}%;background:linear-gradient(90deg,${sc},var(--teal))"></div></div>
    <div style="display:flex;justify-content:space-between;margin-top:8px;font-size:11px;color:var(--text3)">
      <span>กินแล้ว ${eaten} kcal${burn?` · เผา ${burn}`:""}</span>
      <span>เป้า ${t.cal} kcal</span>
    </div>
    <div style="display:flex;gap:8px;margin-top:16px;padding-top:14px;border-top:1px solid var(--border)">
      ${macroRing("โปรตีน",food.reduce((a,f)=>a+(f.protein||0),0),t.protein,"var(--accent)")}
      ${macroRing("คาร์บ",food.reduce((a,f)=>a+(f.carb||0),0),t.carb,"var(--teal)")}
      ${macroRing("ไขมัน",food.reduce((a,f)=>a+(f.fat||0),0),t.fat,"var(--amber)")}
    </div>
  </div>`;

  // ── ปุ่มลัด ──
  h+=`<div class="row" style="gap:10px">
    <button class="card" id="go-body" style="flex:1;cursor:pointer;text-align:center;margin-bottom:12px;padding:16px 8px;display:flex;flex-direction:column;align-items:center;gap:8px">
      <div class="icf icf-teal" style="width:42px;height:42px;font-size:22px">⚖️</div>
      <div style="font-size:12px;font-weight:700;color:var(--text)">สแกนเครื่องชั่ง</div>
    </button>
    <button class="card" id="go-coach" style="flex:1;cursor:pointer;text-align:center;margin-bottom:12px;padding:16px 8px;display:flex;flex-direction:column;align-items:center;gap:8px">
      <div class="icf icf-accent" style="width:42px;height:42px;font-size:22px">💬</div>
      <div style="font-size:12px;font-weight:700;color:var(--text)">ปรึกษาเทรนเนอร์</div>
    </button>
  </div>`;

  if(!lb)h+=`<div class="note">💡 สแกนเครื่องชั่งครั้งแรกในแท็บ "ร่างกาย" เพื่อให้ภาพร่างกายและค่าต่างๆ แม่นยำขึ้น</div>`;
  return h;
}

/* SVG silhouette ที่เปลี่ยนรูปร่าง/สีตามน้ำหนัก + %ไขมัน */
function bodyAvatarSVG(weight,bf,bmi,gender){
  // ความกว้างลำตัว: ยิ่งไขมัน/BMI สูง ยิ่งกว้าง
  let fatLevel;
  if(bf!=null){
    fatLevel=gender==="female"
      ? Math.max(0,Math.min(1,(bf-18)/22))   // หญิง 18-40%
      : Math.max(0,Math.min(1,(bf-8)/22));    // ชาย 8-30%
  }else{
    fatLevel=Math.max(0,Math.min(1,(bmi-19)/13)); // 19-32 BMI
  }
  // สี gradient: เขียว(ฟิต) → เหลือง → ส้ม → แดง
  const hue=120-fatLevel*120; // 120=เขียว, 0=แดง
  const c1=`hsl(${hue},70%,55%)`;
  const c2=`hsl(${hue},65%,42%)`;
  // ปรับความกว้างของลำตัว/เอว
  const torsoW=44+fatLevel*26;      // 44-70
  const waistW=34+fatLevel*34;      // 34-68 (เอวขยายเยอะสุด)
  const cx=110;
  return`<svg viewBox="0 0 220 280" width="150" height="190" xmlns="http://www.w3.org/2000/svg" style="display:block;margin:0 auto">
    <defs>
      <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${c1}"/>
        <stop offset="100%" stop-color="${c2}"/>
      </linearGradient>
      <filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>
    <g fill="url(#bodyGrad)" filter="url(#glow)">
      <circle cx="${cx}" cy="38" r="22"/>
      <rect x="${cx-9}" y="56" width="18" height="14" rx="4"/>
      <path d="M ${cx-torsoW/2} 70
               Q ${cx-torsoW/2-8} 95 ${cx-waistW/2} 150
               Q ${cx-waistW/2+4} 178 ${cx-26} 190
               L ${cx+26} 190
               Q ${cx+waistW/2-4} 178 ${cx+waistW/2} 150
               Q ${cx+torsoW/2+8} 95 ${cx+torsoW/2} 70
               Q ${cx} 62 ${cx-torsoW/2} 70 Z"/>
      <path d="M ${cx-torsoW/2+4} 74 Q ${cx-torsoW/2-22} 110 ${cx-torsoW/2-14} 158 L ${cx-torsoW/2-2} 156 Q ${cx-torsoW/2-6} 112 ${cx-torsoW/2+14} 82 Z"/>
      <path d="M ${cx+torsoW/2-4} 74 Q ${cx+torsoW/2+22} 110 ${cx+torsoW/2+14} 158 L ${cx+torsoW/2+2} 156 Q ${cx+torsoW/2+6} 112 ${cx+torsoW/2-14} 82 Z"/>
      <path d="M ${cx-26} 190 L ${cx-30} 268 L ${cx-14} 268 L ${cx-6} 196 Z"/>
      <path d="M ${cx+26} 190 L ${cx+30} 268 L ${cx+14} 268 L ${cx+6} 196 Z"/>
    </g>
  </svg>`;
}

function bodyStatus(bf,bmi,gender){
  // ประเมินจาก BF% ก่อน ถ้าไม่มีใช้ BMI
  let cat,color,icon;
  if(bf!=null){
    if(gender==="female"){
      if(bf<14){cat="ต่ำกว่าเกณฑ์";color="var(--teal)";icon="⚠️";}
      else if(bf<22){cat="ฟิตมาก (Athletic)";color="var(--green)";icon="🏆";}
      else if(bf<29){cat="ฟิตดี (Fitness)";color="var(--green)";icon="✅";}
      else if(bf<35){cat="ปกติ (Average)";color="var(--amber)";icon="🔸";}
      else{cat="ควรลดไขมัน (Obese)";color="var(--red)";icon="🔴";}
    }else{
      if(bf<6){cat="ต่ำกว่าเกณฑ์";color="var(--teal)";icon="⚠️";}
      else if(bf<14){cat="ฟิตมาก (Athletic)";color="var(--green)";icon="🏆";}
      else if(bf<18){cat="ฟิตดี (Fitness)";color="var(--green)";icon="✅";}
      else if(bf<25){cat="ปกติ (Average)";color="var(--amber)";icon="🔸";}
      else{cat="ควรลดไขมัน (Obese)";color="var(--red)";icon="🔴";}
    }
  }else if(bmi!=null){
    if(bmi<18.5){cat="ผอมเกิน (Underweight)";color="var(--teal)";icon="⚠️";}
    else if(bmi<23){cat="รูปร่างดี (Normal)";color="var(--green)";icon="✅";}
    else if(bmi<25){cat="ท้วม (Overweight)";color="var(--amber)";icon="🔸";}
    else if(bmi<30){cat="น้ำหนักเกิน (Obese I)";color="var(--red)";icon="🔴";}
    else{cat="อ้วนมาก (Obese II)";color="var(--red)";icon="🔴";}
  }else{cat="รอข้อมูลร่างกาย";color="var(--text3)";icon="📊";}
  return`<div style="display:inline-flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:7px 16px">
    <span style="font-size:15px">${icon}</span>
    <span style="font-size:13px;font-weight:700;color:${color}">${cat}</span>
  </div>`;
}

function viewFood(){
  const p=LS.get(K.profile,null),base=computeTargets(p,latestBody());
  const dt=dayTarget(state.date,base);
  const t={...base,cal:dt.cal};
  const food=LS.get(K.food(state.date),[]);
  const tot=food.reduce((a,f)=>({cal:a.cal+f.cal,protein:a.protein+f.protein,carb:a.carb+f.carb,fat:a.fat+f.fat}),{cal:0,protein:0,carb:0,fat:0});
  const remain=t.cal-tot.cal,pct=Math.min(100,tot.cal/t.cal*100);
  const sc=tot.cal>t.cal?"var(--red)":pct>85?"var(--amber)":"var(--green)";
  let h=`<div class="card card-glow">
    <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:14px">
      <div>
        <div class="lbl" style="margin-bottom:6px">แคลอรี่วันนี้${dt.banked?` <span style="color:var(--accent2)">🏦</span>`:""}</div>
        <div class="num" style="font-size:42px;font-weight:900;color:${sc};line-height:1">${remain>=0?remain:"+"+Math.abs(remain)}</div>

function macro(label,v,t,c){
  const pct=Math.min(100,v/(t||1)*100);
  return`<div class="macro">
    <div class="top"><span class="ml">${label}</span><span class="mv num">${v}/${t}g</span></div>
    <div class="mt"><div class="mf" style="width:${pct}%;background:${c}"></div></div>
  </div>`;
}
/* วงแหวน macro แบบ Soom (SVG ring) */
function macroRing(label,v,t,color){
  const pct=Math.min(1,v/(t||1));
  const r=24,cir=2*Math.PI*r,off=cir*(1-pct);
  return`<div style="flex:1;text-align:center">
    <div style="position:relative;width:62px;height:62px;margin:0 auto">
      <svg width="62" height="62" viewBox="0 0 62 62" style="transform:rotate(-90deg)">
        <circle cx="31" cy="31" r="${r}" fill="none" stroke="var(--bg3)" stroke-width="6"/>
        <circle cx="31" cy="31" r="${r}" fill="none" stroke="${color}" stroke-width="6" stroke-linecap="round"
          stroke-dasharray="${cir}" stroke-dashoffset="${off}" style="transition:stroke-dashoffset .5s"/>
      </svg>
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--text)">${Math.round(pct*100)}<span style="font-size:9px">%</span></div>
    </div>
    <div style="margin-top:5px;font-size:10px;color:var(--text3);font-weight:600">${label}</div>
    <div style="font-size:10.5px;font-weight:700;color:${color}">${v}/${t}g</div>
  </div>`;
}

    const gc=document.getElementById("go-coach");if(gc)gc.onclick=openCoach;
  }
  if(state.tab==="food"){
    const af=document.getElementById("analyze-food");if(af)af.onclick=openFoodAnalysis;
    document.querySelectorAll(".addbtn").forEach(b=>b.onclick=()=>openAddFood(b.dataset.meal));
    document.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>{
      const food=LS.get(K.food(state.date),[]).filter(f=>String(f.id)!==b.dataset.del);
      LS.set(K.food(state.date),food);render();
    });
    const wp=document.getElementById("water-plus");if(wp)wp.onclick=()=>{const w=LS.get(K.water(state.date),0);LS.set(K.water(state.date),Math.min(20,w+1));render();};
    const wm=document.getElementById("water-minus");if(wm)wm.onclick=()=>{const w=LS.get(K.water(state.date),0);LS.set(K.water(state.date),Math.max(0,w-1));render();};
    // ── Fasting handlers ──
    const FH={"16:8":16,"18:6":18,"20:4":20,"OMAD":23};
    document.querySelectorAll("#fast-mode button").forEach(b=>b.onclick=()=>{
      const f=LS.get(K.fast,{mode:"16:8",startedAt:null,streak:0,done:0,total:0,lastDone:null});
      f.mode=b.dataset.fm;LS.set(K.fast,f);render();
    });
    const fs=document.getElementById("fast-start");
    if(fs)fs.onclick=()=>{
      const f=LS.get(K.fast,{mode:"16:8",startedAt:null,streak:0,done:0,total:0,lastDone:null});
      f.startedAt=Date.now();LS.set(K.fast,f);render();toast("⏳ เริ่ม Fasting แล้ว สู้ๆ!");
    };
    const fe=document.getElementById("fast-end");
    if(fe)fe.onclick=()=>{
      const f=LS.get(K.fast,{mode:"16:8",startedAt:null,streak:0,done:0,total:0,lastDone:null});
      if(!f.startedAt)return;
      const target=FH[f.mode||"16:8"]*3600000;
      const success=(Date.now()-f.startedAt)>=target;
      if(!success&&!confirm("ยังไม่ครบเวลา จบตอนนี้จะไม่นับสำเร็จและ streak รีเซ็ต — จบเลยไหม?"))return;
      f.total=(f.total||0)+1;
      if(success){
        f.done=(f.done||0)+1;
        const today=todayStr(),yest=addDays(today,-1);
        f.streak=(f.lastDone===yest||f.lastDone===today)?(f.streak||0)+1:1;
        f.lastDone=today;
      }else{f.streak=0;}
      f.startedAt=null;LS.set(K.fast,f);render();
      toast(success?"🎉 Fasting สำเร็จ! Streak "+f.streak:"จบ Fasting แล้ว ครั้งหน้าเอาใหม่");
    };
    // live timer tick (อัพเดททุก 30 วิ เฉพาะตอนกำลังอด)
    if(window._fastTick)clearInterval(window._fastTick);
    const fObj=LS.get(K.fast,null);
    if(fObj&&fObj.startedAt&&document.getElementById("fast-timer")){
      window._fastTick=setInterval(()=>{
        const el=document.getElementById("fast-timer");
        if(!el){clearInterval(window._fastTick);return;}
        const e2=Date.now()-fObj.startedAt;
        el.textContent=Math.floor(e2/3600000)+":"+String(Math.floor(e2%3600000/60000)).padStart(2,"0");
      },30000);
    }
  }
  if(state.tab==="body")bindBody();
  if(state.tab==="workout")bindWorkout();
  if(state.tab==="more")bindMore();
}

/* รวบรวมอาหารที่กินบ่อย/ล่าสุด จาก 30 วันหลัง */
function recentFoods(){
  const seen={},order=[];
  for(let i=0;i<30;i++){
    const d=addDays(todayStr(),-i);
    const fl=LS.get(K.food(d),[]);
    fl.forEach(f=>{
      const key=f.name.trim().toLowerCase();
      if(!seen[key]){seen[key]={name:f.name,cal:f.cal,protein:f.protein,carb:f.carb,fat:f.fat,count:0};order.push(key);}
      seen[key].count++;
    });
  }
  // เรียงตามความถี่ แล้วเอา 10 อันดับ
  return order.map(k=>seen[k]).sort((a,b)=>b.count-a.count).slice(0,10);
}

    <div id="af-text" style="display:none;margin-bottom:14px">

      <textarea id="af-textinput" rows="3" placeholder="เช่น ข้าวมันไก่ 1 จาน กับชาเย็นหวานน้อย 1 แก้ว" style="width:100%;background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px;font-family:inherit;font-size:13px;resize:vertical;margin-bottom:10px"></textarea>
      <button class="btn btn-block" id="af-textanalyze" style="background:linear-gradient(135deg,var(--accent),var(--teal));color:#fff">🤖 วิเคราะห์</button>
      <div id="af-textresult" style="margin-top:12px"></div>
    </div>
    <div id="af-photo" style="display:none;margin-bottom:14px"></div>
    <div id="af-manual">
      <div style="margin-bottom:10px"><div class="flbl">ชื่ออาหาร</div><input id="f-name" placeholder="เช่น ข้าวมันไก่"></div>
      <div class="row" style="margin-bottom:10px">
        <div class="field"><div class="flbl">แคลอรี่</div><input id="f-cal" type="number" inputmode="decimal"></div>
        <div class="field"><div class="flbl">โปรตีน (g)</div><input id="f-protein" type="number" inputmode="decimal"></div>
      </div>
      <div class="row" style="margin-bottom:10px">
        <div class="field"><div class="flbl">คาร์บ (g)</div><input id="f-carb" type="number" inputmode="decimal"></div>
        <div class="field"><div class="flbl">ไขมัน (g)</div><input id="f-fat" type="number" inputmode="decimal"></div>

        <input type="checkbox" id="f-save" style="width:auto;accent-color:var(--accent)"> บันทึกเป็นรายการโปรด
      </label>
    </div>
    <div class="err" id="af-err" style="margin-bottom:8px"></div>
    <button class="btn-save" id="af-submit">บันทึกลงมื้อ${ml}</button>
  `);
  document.getElementById("close-af").onclick=closeSheet;
  const addItem=item=>{
    const food=LS.get(K.food(state.date),[]);
    food.push({id:Date.now()+"r",meal,name:item.name,cal:item.cal,protein:item.protein||0,carb:item.carb||0,fat:item.fat||0,time:new Date().toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit"})});
    LS.set(K.food(state.date),food);closeSheet();render();toast("✅ เพิ่ม "+item.name+" แล้ว");
  };
  document.querySelectorAll("[data-recent]").forEach(c=>c.onclick=()=>addItem(recent[+c.dataset.recent]));
  let imgState={mime:null,b64:null};
  const photoBox=document.getElementById("af-photo"),manBox=document.getElementById("af-manual"),textBox=document.getElementById("af-text");
  // เก็บ state ของ multi-item analysis (ใช้ร่วมกันทั้งรูปและข้อความ)
  let faItems=[];
  let faTarget=photoBox; // container ที่จะ render การ์ดผลลัพธ์ลงไป
  document.querySelectorAll("#afmode button").forEach(b=>b.onclick=()=>{
    document.querySelectorAll("#afmode button").forEach(x=>x.classList.remove("on"));
    b.classList.add("on");
    const mode=b.dataset.m;
    photoBox.style.display=mode==="photo"?"block":"none";
    textBox.style.display=mode==="text"?"block":"none";
    manBox.style.display=mode==="manual"?"block":"none";
    document.getElementById("af-submit").style.display=mode==="manual"?"block":"none";
    if(mode==="photo"){
      faTarget=photoBox;
      if(!photoBox.innerHTML){
      renderImgPicker(photoBox,imgState,"อาหาร",async()=>{
        setErr("af-err","");const btn=document.getElementById("af-analyze");
        if(btn){btn.textContent="🔍 กำลังวิเคราะห์...";btn.disabled=true;}
        try{
          const txt=await callClaude({max_tokens:1000,
            system:"ตอบ JSON เท่านั้น ห้ามมีข้อความอื่น ห้ามใส่ markdown",
            messages:[{role:"user",content:[
            {type:"image",source:{type:"base64",media_type:imgState.mime,data:imgState.b64}},
            {type:"text",text:`วิเคราะห์อาหารทุกอย่างในรูป แยกเป็นรายการ (ถ้ามีหลายอย่างในจานให้แยกแต่ละอย่าง)
ตอบ JSON เท่านั้น: {"items":[{"name":"ชื่ออาหาร","size":"ปริมาณที่ประเมิน เช่น 1 ชาม/150g/2 ชิ้น","method":"วิธีปรุง เช่น ต้ม/ย่าง/ทอด/นึ่ง หรือ - ถ้าไม่เกี่ยว","cal":0,"protein":0,"carb":0,"fat":0,"fiber":0,"sugar":0,"sodium":0}]}
(fiber/sugar เป็นกรัม sodium เป็นมิลลิกรัม ประเมินให้ด้วย)`}
          ]}]});
          const r=extractJSON(txt);
          faItems=(r.items||[]).map(it=>({name:it.name||"อาหาร",size:it.size||"",method:it.method||"",cal:Math.round(it.cal)||0,protein:Math.round(it.protein)||0,carb:Math.round(it.carb)||0,fat:Math.round(it.fat)||0,fiber:Math.round(it.fiber)||0,sugar:Math.round(it.sugar)||0,sodium:Math.round(it.sodium)||0}));
          if(!faItems.length)faItems=[{name:"อาหาร",size:"",method:"",cal:0,protein:0,carb:0,fat:0}];
          faTarget=photoBox;
          renderFaItems();
        }catch(e){setErr("af-err",aiError(e));if(btn){btn.textContent="🤖 วิเคราะห์ด้วย AI";btn.disabled=false;}}
      });
      }
    }
  });

  // โหมดพิมพ์บอก AI
  document.getElementById("af-textanalyze").onclick=async()=>{
    const desc=document.getElementById("af-textinput").value.trim();
    if(!desc){setErr("af-err","พิมพ์บอกว่ากินอะไรไปก่อนครับ");return;}
    setErr("af-err","");
    const btn=document.getElementById("af-textanalyze");btn.textContent="🔄 กำลังวิเคราะห์...";btn.disabled=true;
    try{
      const txt=await callClaude({max_tokens:1000,
        system:"ตอบ JSON เท่านั้น ห้ามมีข้อความอื่น ห้ามใส่ markdown",
        messages:[{role:"user",content:`ผู้ใช้บอกว่ากินอาหารเหล่านี้: "${desc}"
แยกเป็นรายการแต่ละอย่าง คำนวณค่าโภชนาการให้แม่นยำตามปริมาณที่ระบุ (ถ้าไม่ระบุปริมาณให้ประเมินขนาดมาตรฐาน 1 หน่วยเสิร์ฟ)
ตอบ JSON เท่านั้น: {"items":[{"name":"ชื่ออาหาร","size":"ปริมาณ เช่น 1 จาน/1 แก้ว/150g","method":"วิธีปรุง หรือ - ถ้าไม่เกี่ยว","cal":0,"protein":0,"carb":0,"fat":0,"fiber":0,"sugar":0,"sodium":0}]}
(fiber/sugar กรัม sodium มิลลิกรัม)`}]});
      const r=extractJSON(txt);
      faItems=(r.items||[]).map(it=>({name:it.name||"อาหาร",size:it.size||"",method:it.method||"",cal:Math.round(it.cal)||0,protein:Math.round(it.protein)||0,carb:Math.round(it.carb)||0,fat:Math.round(it.fat)||0,fiber:Math.round(it.fiber)||0,sugar:Math.round(it.sugar)||0,sodium:Math.round(it.sodium)||0}));
      if(!faItems.length){setErr("af-err","ไม่พบอาหารในข้อความ ลองพิมพ์ใหม่");btn.textContent="🤖 วิเคราะห์";btn.disabled=false;return;}
      faTarget=document.getElementById("af-textresult");
      renderFaItems();
    }catch(e){setErr("af-err",aiError(e));btn.textContent="🤖 วิเคราะห์";btn.disabled=false;}
  };

  // วาดรายการ item ที่แก้ไขได้ + ช่องแจ้งแก้ + ปุ่ม re-analyze
  function renderFaItems(){
    const tot=faItems.reduce((a,i)=>({c:a.c+i.cal,p:a.p+i.protein,cb:a.cb+i.carb,ft:a.ft+i.fat}),{c:0,p:0,cb:0,ft:0});
    faTarget.innerHTML=`
      <div class="note" style="margin-bottom:12px;font-size:12px">🤖 AI เห็น ${faItems.length} รายการ — แก้ไขได้ ถ้าไม่ตรงให้พิมพ์บอกด้านล่างแล้วกด "วิเคราะห์ใหม่"</div>
      <div id="fa-items">${faItems.map((it,i)=>faItemCard(it,i)).join("")}</div>
      <button class="btn btn-ghost btn-block" id="fa-add" style="margin-bottom:12px">➕ เพิ่มรายการ</button>
      <div class="card" style="padding:13px;margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;font-size:13px;font-weight:800">
          <span>รวมทั้งหมด</span>
          <span id="fa-sum" style="color:var(--accent2)">${tot.c} kcal</span>
        </div>
        <div id="fa-macsum" style="font-size:11px;color:var(--text3);margin-top:3px">P${tot.p}g · C${tot.cb}g · F${tot.ft}g</div>
      </div>
      <div style="margin-bottom:10px">
        <div class="flbl">💬 แจ้งแก้ไขให้ AI (ถ้าวิเคราะห์ไม่ตรง)</div>
        <textarea id="fa-correct" rows="2" placeholder="เช่น: อันที่ 2 ผิด ต้องเป็นไก่ต้ม 200g ไม่ใช่ไก่ย่าง / ขาดผักต้ม 50g" style="width:100%;background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px;font-family:inherit;font-size:13px;resize:vertical"></textarea>
      </div>
      <button class="btn btn-block" id="fa-reanalyze" style="margin-bottom:8px;background:linear-gradient(135deg,var(--accent),var(--teal));color:#fff">🤖 วิเคราะห์ใหม่ตามที่แจ้ง</button>
      <button class="btn-save" id="fa-saveall">บันทึกทั้งหมดลงมื้อ${ml}</button>
    `;
    // bind: edit fields
    faTarget.querySelectorAll("[data-fi]").forEach(inp=>inp.oninput=()=>{
      const i=+inp.dataset.fi,k=inp.dataset.k;
      faItems[i][k]=(k==="name"||k==="size"||k==="method")?inp.value:(+inp.value||0);
      // อัพเดทยอดรวมแบบ live เฉพาะตัวเลข
      if(k!=="name"&&k!=="size"&&k!=="method"){
        const tot=faItems.reduce((a,it)=>({c:a.c+it.cal,p:a.p+it.protein,cb:a.cb+it.carb,ft:a.ft+it.fat}),{c:0,p:0,cb:0,ft:0});
        const sumEl=faTarget.querySelector("#fa-sum");if(sumEl)sumEl.textContent=tot.c+" kcal";
        const macEl=faTarget.querySelector("#fa-macsum");if(macEl)macEl.textContent=`P${tot.p}g · C${tot.cb}g · F${tot.ft}g`;
      }
    });
    // delete item
    faTarget.querySelectorAll("[data-fidel]").forEach(b=>b.onclick=()=>{faItems.splice(+b.dataset.fidel,1);if(!faItems.length)faItems=[{name:"อาหาร",size:"",method:"",cal:0,protein:0,carb:0,fat:0}];renderFaItems();});
    // add item
    faTarget.querySelector("#fa-add").onclick=()=>{faItems.push({name:"",size:"",method:"",cal:0,protein:0,carb:0,fat:0});renderFaItems();};
    // re-analyze with correction note
    faTarget.querySelector("#fa-reanalyze").onclick=faReanalyze;
    // save all
    faTarget.querySelector("#fa-saveall").onclick=()=>{
      const valid=faItems.filter(it=>it.name.trim()&&it.cal>0);
      if(!valid.length){setErr("af-err","ไม่มีรายการที่บันทึกได้ (ต้องมีชื่อและแคลอรี่)");return;}
      const food=LS.get(K.food(state.date),[]);
      valid.forEach(it=>food.push({id:Date.now()+"r"+Math.random().toString(36).slice(2,6),meal,name:it.name.trim(),cal:it.cal,protein:it.protein,carb:it.carb,fat:it.fat,fiber:it.fiber||0,sugar:it.sugar||0,sodium:it.sodium||0,time:new Date().toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit"})}));
      LS.set(K.food(state.date),food);closeSheet();render();toast(`✅ บันทึก ${valid.length} รายการแล้ว`);
    };
  }

  function faItemCard(it,i){
    return`<div class="card" style="padding:12px;margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-size:10px;font-weight:800;color:var(--accent2)">รายการ ${i+1}</span>
        <button class="delbtn" data-fidel="${i}" style="width:24px;height:24px;font-size:14px">×</button>
      </div>
      <div style="margin-bottom:8px"><div class="flbl">ชื่ออาหาร</div><input data-fi="${i}" data-k="name" value="${esc(it.name)}" placeholder="เช่น ไก่ต้ม"></div>
      <div class="row" style="margin-bottom:8px">
        <div class="field"><div class="flbl">ปริมาณ</div><input data-fi="${i}" data-k="size" value="${esc(it.size)}" placeholder="150g / 1 ชาม"></div>
        <div class="field"><div class="flbl">วิธีปรุง</div><input data-fi="${i}" data-k="method" value="${esc(it.method)}" placeholder="ต้ม/ย่าง/ทอด"></div>
      </div>
      <div class="row" style="margin-bottom:6px">
        <div class="field"><div class="flbl">kcal</div><input data-fi="${i}" data-k="cal" type="number" inputmode="decimal" value="${it.cal}"></div>
        <div class="field"><div class="flbl">โปรตีน</div><input data-fi="${i}" data-k="protein" type="number" inputmode="decimal" value="${it.protein}"></div>
      </div>
      <div class="row">
        <div class="field"><div class="flbl">คาร์บ</div><input data-fi="${i}" data-k="carb" type="number" inputmode="decimal" value="${it.carb}"></div>
        <div class="field"><div class="flbl">ไขมัน</div><input data-fi="${i}" data-k="fat" type="number" inputmode="decimal" value="${it.fat}"></div>
      </div>
    </div>`;
  }

  async function faReanalyze(){
    const note=(faTarget.querySelector("#fa-correct")?.value||"").trim();
    if(!note){setErr("af-err","พิมพ์รายละเอียดที่ต้องการแก้ก่อนครับ");return;}
    setErr("af-err","");
    const btn=faTarget.querySelector("#fa-reanalyze");
    if(btn){btn.textContent="🔄 กำลังวิเคราะห์ใหม่...";btn.disabled=true;}
    try{
      const content=[];
      // ส่งรูปกลับไปด้วย ถ้ายังมี (ช่วยให้แม่นขึ้น)
      if(imgState.b64)content.push({type:"image",source:{type:"base64",media_type:imgState.mime,data:imgState.b64}});
      content.push({type:"text",text:`นี่คือผลวิเคราะห์อาหารปัจจุบัน:
${faItems.map((it,i)=>`${i+1}. ${it.name} ${it.size} ${it.method} = ${it.cal}kcal P${it.protein} C${it.carb} F${it.fat}`).join("\n")}

ผู้ใช้แจ้งแก้ไข: "${note}"

ปรับรายการตามที่แจ้ง (แก้/เพิ่ม/ลบรายการ) แล้วคำนวณค่าโภชนาการใหม่ให้แม่นยำตามปริมาณและวิธีปรุงที่ระบุ
ตอบ JSON เท่านั้น: {"items":[{"name":"","size":"","method":"","cal":0,"protein":0,"carb":0,"fat":0,"fiber":0,"sugar":0,"sodium":0}]}`});
      const txt=await callClaude({max_tokens:1000,system:"ตอบ JSON เท่านั้น ห้ามมีข้อความอื่น ห้ามใส่ markdown",messages:[{role:"user",content}]});
      const r=extractJSON(txt);
      if(r.items&&Array.isArray(r.items)&&r.items.length){
        faItems=r.items.map(it=>({name:it.name||"อาหาร",size:it.size||"",method:it.method||"",cal:Math.round(it.cal)||0,protein:Math.round(it.protein)||0,carb:Math.round(it.carb)||0,fat:Math.round(it.fat)||0}));
        renderFaItems();
        toast("✅ วิเคราะห์ใหม่แล้ว");
      }else{setErr("af-err","ไม่สามารถวิเคราะห์ใหม่ได้ ลองพิมพ์ใหม่");if(btn){btn.textContent="🤖 วิเคราะห์ใหม่ตามที่แจ้ง";btn.disabled=false;}}
    }catch(e){setErr("af-err",aiError(e));if(btn){btn.textContent="🤖 วิเคราะห์ใหม่ตามที่แจ้ง";btn.disabled=false;}}
  }
  document.querySelectorAll("[data-fav]").forEach(c=>c.onclick=()=>{
    const f=fav[+c.dataset.fav];
    const food=LS.get(K.food(state.date),[]);
    food.push({id:Date.now()+"r",meal,name:f.name,cal:f.cal,protein:f.protein||0,carb:f.carb||0,fat:f.fat||0,time:new Date().toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit"})});
    LS.set(K.food(state.date),food);closeSheet();render();toast("✅ เพิ่ม "+f.name+" แล้ว");
  });
  document.getElementById("af-submit").onclick=()=>{
    const name=document.getElementById("f-name").value.trim(),cal=+document.getElementById("f-cal").value;
    if(!name||!cal){setErr("af-err","กรุณาใส่ชื่อและแคลอรี่");return;}
    const item={name,cal,protein:+document.getElementById("f-protein").value||0,carb:+document.getElementById("f-carb").value||0,fat:+document.getElementById("f-fat").value||0};
    if(document.getElementById("f-save").checked){const fv=LS.get(K.fav,[]);if(!fv.some(x=>x.name===name)){fv.push(item);LS.set(K.fav,fv);}}
    const food=LS.get(K.food(state.date),[]);
    food.push({id:Date.now()+"r",meal,...item,time:new Date().toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit"})});
    LS.set(K.food(state.date),food);closeSheet();render();toast("✅ บันทึกแล้ว");
  };
}

/* ── image picker (camera + library) ── */
function renderImgPicker(box,imgState,hint,onAnalyze){
  box.innerHTML=`
    <div class="img-opts">
      <button class="imgbtn" id="ip-cam"><span class="ic2">📷</span><span class="tx">ถ่ายรูป</span></button>
      <button class="imgbtn" id="ip-lib"><span class="ic2">🖼️</span><span class="tx">เลือกจากคลัง</span></button>
    </div>
    <input type="file" accept="image/*" capture="environment" id="ip-file-cam" style="display:none">
    <input type="file" accept="image/*" id="ip-file-lib" style="display:none">
    <div id="ip-preview"></div>
  `;
  const fileCam=box.querySelector("#ip-file-cam"),fileLib=box.querySelector("#ip-file-lib");
  box.querySelector("#ip-cam").onclick=()=>fileCam.click();
  box.querySelector("#ip-lib").onclick=()=>fileLib.click();
  const handleFile=f=>{
    if(!f)return;const r=new FileReader();
    r.onload=ev=>{
      const m=ev.target.result.match(/^data:(.*?);base64,(.*)$/);
      imgState.mime=m[1];imgState.b64=m[2];
      box.querySelector("#ip-preview").innerHTML=`
        <div style="text-align:center">
          <img src="${ev.target.result}" style="max-height:180px;border-radius:var(--r-md);border:1px solid var(--border);margin-bottom:10px">
          <div class="row">
            <button class="btn btn-ghost" id="ip-change">เปลี่ยนรูป</button>
            <button class="btn btn-primary" id="af-analyze" style="flex:1">🤖 วิเคราะห์ด้วย AI</button>
          </div>
        </div>`;
      box.querySelector("#ip-change").onclick=()=>renderImgPicker(box,imgState,hint,onAnalyze);
      box.querySelector("#af-analyze").onclick=onAnalyze;

/* สรุปแนวโน้ม + อัตราต่อสัปดาห์ */
function trendSummary(data){
  if(data.length<2)return `<div class="small">ข้อมูลยังไม่พอในช่วงนี้</div>`;
  const f=data[0],l=data[data.length-1];
  const days=Math.max(1,(new Date(l.date)-new Date(f.date))/86400000);
  const weeks=days/7;
  const rows=[];
  const wChange=l.weight-f.weight;
  rows.push(["น้ำหนัก",wChange,"kg",wChange/weeks]);
  if(f.bodyFat!=null&&l.bodyFat!=null)rows.push(["ไขมัน",l.bodyFat-f.bodyFat,"%",(l.bodyFat-f.bodyFat)/weeks]);
  if(f.muscleMass!=null&&l.muscleMass!=null)rows.push(["กล้ามเนื้อ",l.muscleMass-f.muscleMass,"kg",(l.muscleMass-f.muscleMass)/weeks]);
  return`<div style="display:flex;flex-direction:column;gap:8px">
    ${rows.map(([label,chg,unit,perWeek])=>{
      const good=label==="กล้ามเนื้อ"?chg>=0:chg<=0;
      const col=Math.abs(chg)<0.05?"var(--text2)":good?"var(--green)":"var(--red)";
      const arrow=chg<0?"▼":chg>0?"▲":"–";
      return`<div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:13px;color:var(--text2)">${label}</span>
        <span style="font-size:13px;font-weight:700;color:${col}">${arrow} ${Math.abs(chg).toFixed(1)}${unit} <span style="font-size:10px;color:var(--text3);font-weight:500">(${perWeek>=0?"+":""}${perWeek.toFixed(2)}${unit}/สัปดาห์)</span></span>
      </div>`;
    }).join("")}
    <div class="small" style="margin-top:2px">ช่วง ${Math.round(days)} วัน (${data.length} ครั้งที่ชั่ง)</div>
  </div>`;
}

function goalBar(label,from,now,target,unit){
  const start=from??now,total=Math.abs(start-target)||1,done=Math.abs(start-now),pct=Math.min(100,Math.round(done/total*100));
  return`<div class="goalbar">
    <div class="top"><span class="gl">${label}</span><span class="gv num">${now}${unit} → ${target}${unit}</span></div>
    <div class="track"><div class="fill" style="width:${pct}%"></div></div>
    <div class="gpct">คืบหน้า ${pct}% (จาก ${start}${unit})</div>
  </div>`;
}

function trendCard(title,data,field,color){
  const pts=data.filter(d=>d[field]!=null);
  if(pts.length<2)return"";
  const fmtD=ds=>{const p=ds.split("-");return +p[2]+"/"+ +p[1];};
  const first=pts[0][field],last=pts[pts.length-1][field],diff=+(last-first).toFixed(1);
  const dc=diff<0?"var(--green)":diff>0?"var(--amber)":"var(--text3)";
  return`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div class="lbl">${title}</div>
      <div style="font-size:12px;font-weight:800;color:${dc}">${diff>0?"+":""}${diff}</div>
    </div>
    ${lineChart(pts.map(d=>({x:fmtD(d.date),y:d[field]})),{color})}
  </div>`;
}

/* หา log ครั้งล่าสุดของท่านี้ (ก่อนวันที่ปัจจุบัน) */
function lastExLog(name,beforeDate){
  for(let i=1;i<=60;i++){
    const d=addDays(beforeDate,-i);
    const log=LS.get(K.exlog(d),{});
    if(log[name])return log[name];
  }
  return null;
}

/* ── 1RM (Epley formula): weight × (1 + reps/30) ── */
function calc1RM(kg,reps){
  if(!kg||!reps)return 0;
  if(reps===1)return kg;
  return Math.round(kg*(1+reps/30));
}
/* หา best 1RM จาก log ของท่า (จากทุกเซ็ต) */
function best1RM(log){
  if(!log?.sets)return 0;
  return Math.max(0,...log.sets.map(s=>calc1RM(+s.kg||0,+s.reps||0)));
}
/* หา best น้ำหนักสูงสุด (heaviest set) */
function bestWeight(log){
  if(!log?.sets)return 0;
  return Math.max(0,...log.sets.map(s=>+s.kg||0));
}
/* volume ของ log (kg×reps รวม) */
function logVolume(log){
  if(!log?.sets)return 0;
  return log.sets.reduce((a,s)=>a+(+s.kg||0)*(+s.reps||0),0);
}
/* เก็บประวัติท่า: [{date, oneRM, volume, topKg}] เรียงเก่า→ใหม่ (90 วัน) */
function exerciseHistory(name,upToDate){
  const hist=[];
  for(let i=90;i>=0;i--){
    const d=addDays(upToDate,-i);
    const log=(LS.get(K.exlog(d),{}))[name];
    if(log?.sets&&log.sets.length){
      hist.push({date:d,oneRM:best1RM(log),volume:logVolume(log),topKg:bestWeight(log)});
    }
  }
  return hist;
}
/* ตรวจ PR: เทียบ log วันนี้กับประวัติก่อนหน้า → คืน {newWeight, new1RM} */
function checkPR(name,date){
  const todayLog=(LS.get(K.exlog(date),{}))[name];
  if(!todayLog?.sets)return null;
  const todayW=bestWeight(todayLog),today1RM=best1RM(todayLog);
  let prevMaxW=0,prevMax1RM=0;
  for(let i=1;i<=180;i++){
    const d=addDays(date,-i);
    const log=(LS.get(K.exlog(d),{}))[name];
    if(log?.sets){prevMaxW=Math.max(prevMaxW,bestWeight(log));prevMax1RM=Math.max(prevMax1RM,best1RM(log));}
  }
  const pr={};
  if(todayW>prevMaxW&&prevMaxW>0)pr.newWeight=todayW;
  if(today1RM>prevMax1RM&&prevMax1RM>0)pr.new1RM=today1RM;
  return (pr.newWeight||pr.new1RM)?pr:null;
}

/* ── SVG line chart (self-contained, no library) ──
   data: [{x:label, y:number}], returns SVG string */
function lineChart(data,{color="var(--accent)",height=120,fill=true,unit=""}={}){
  if(!data||data.length<2)return`<div style="text-align:center;padding:24px;color:var(--text3);font-size:12px">ยังมีข้อมูลไม่พอวาดกราฟ (ต้องมีอย่างน้อย 2 จุด)</div>`;
  const W=300,H=height,pad={t:14,r:10,b:20,l:34};
  const iw=W-pad.l-pad.r,ih=H-pad.t-pad.b;
  const ys=data.map(d=>d.y);
  let min=Math.min(...ys),max=Math.max(...ys);
  if(min===max){min=min*0.9;max=max*1.1||1;}
  const rng=max-min;
  const px=i=>pad.l+(data.length===1?iw/2:i/(data.length-1)*iw);
  const py=v=>pad.t+ih-((v-min)/rng)*ih;
  const pts=data.map((d,i)=>`${px(i).toFixed(1)},${py(d.y).toFixed(1)}`).join(" ");
  const areaPath=`M${px(0)},${py(data[0].y)} `+data.map((d,i)=>`L${px(i)},${py(d.y)}`).join(" ")+` L${px(data.length-1)},${pad.t+ih} L${px(0)},${pad.t+ih} Z`;
  // y-axis labels (min, mid, max)
  const yl=[min,(min+max)/2,max];
  const gid="g"+Math.random().toString(36).slice(2,7);
  return`<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
    </linearGradient></defs>
    ${yl.map(v=>{const y=py(v);return`<line x1="${pad.l}" y1="${y.toFixed(1)}" x2="${W-pad.r}" y2="${y.toFixed(1)}" stroke="var(--border)" stroke-width="1" stroke-dasharray="2,3"/><text x="${pad.l-5}" y="${(y+3).toFixed(1)}" text-anchor="end" font-size="9" fill="var(--text3)">${Math.round(v)}</text>`;}).join("")}
    ${fill?`<path d="${areaPath}" fill="url(#${gid})"/>`:""}
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${data.map((d,i)=>`<circle cx="${px(i).toFixed(1)}" cy="${py(d.y).toFixed(1)}" r="${i===data.length-1?3.5:2}" fill="${color}"/>`).join("")}
    <text x="${pad.l}" y="${H-6}" font-size="8.5" fill="var(--text3)">${data[0].x}</text>
    <text x="${W-pad.r}" y="${H-6}" text-anchor="end" font-size="8.5" fill="var(--text3)">${data[data.length-1].x}</text>
  </svg>`;
}

/* บันทึกน้ำหนัก/reps แบบรายเซ็ต (S1-S4) */
function openExLog(ex){
  const exlog=LS.get(K.exlog(state.date),{});
  const cur=exlog[ex.name]||{};
  const last=lastExLog(ex.name,state.date);
  // จำนวนเซ็ตเป้าหมายจาก ex.sets เช่น "4x10" → 4 เซ็ต, default reps 10
  const sm=(ex.sets||"").match(/(\d+)\s*[xX×]\s*(\d+)/);
  const targetSets=sm?+sm[1]:(cur.sets?.length||3);
  const targetReps=sm?+sm[2]:10;
  // สร้าง set rows: ใช้ค่าเดิมถ้ามี ไม่งั้นใช้ค่าจากครั้งก่อน/เป้าหมาย
  let sets=[];
  if(cur.sets&&cur.sets.length){sets=cur.sets.map(s=>({...s}));}
  else{
    const lastSets=last?.sets;
    for(let i=0;i<targetSets;i++){
      sets.push({reps:lastSets?.[i]?.reps??targetReps,kg:lastSets?.[i]?.kg??last?.sets?.[0]?.kg??"",done:false});
    }
  }
  window._elSets=sets;
  const lastLine=last?(last.sets?`${last.sets.length} เซ็ต · ${last.sets.map(s=>s.kg+"×"+s.reps).join(", ")}`:(last.detail||"")):"";
  // ประวัติ + สถิติ
  const hist=exerciseHistory(ex.name,state.date);
  const allTime1RM=hist.length?Math.max(...hist.map(h=>h.oneRM)):0;
  const allTimeKg=hist.length?Math.max(...hist.map(h=>h.topKg)):0;
  const curLog=(LS.get(K.exlog(state.date),{}))[ex.name];
  const cur1RM=curLog?best1RM(curLog):0;
  showSheet(`
    <div class="handle"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div>
        <div class="sheetTitle">${esc(ex.name)}</div>
        <div class="sheetSub">${esc(ex.muscle||"")} · เป้า ${esc(ex.sets||"")}</div>
      </div>
      <button id="close-el" style="margin-left:auto;background:var(--bg3);border:1px solid var(--border);border-radius:50%;width:32px;height:32px;font-size:18px;color:var(--text2);cursor:pointer;flex-shrink:0">×</button>
    </div>
    ${(allTime1RM||cur1RM)?`<div style="display:flex;gap:8px;margin-bottom:12px">
      <div style="flex:1;background:var(--accent-bg);border-radius:var(--r-md);padding:10px;text-align:center"><div style="font-size:18px;font-weight:900;color:var(--accent2)">${cur1RM||"–"}</div><div style="font-size:9.5px;color:var(--text3)">1RM วันนี้ (kg)</div></div>
      <div style="flex:1;background:var(--bg3);border-radius:var(--r-md);padding:10px;text-align:center"><div style="font-size:18px;font-weight:900;color:var(--text)">${allTime1RM||"–"}</div><div style="font-size:9.5px;color:var(--text3)">🏆 1RM สูงสุด</div></div>
      <div style="flex:1;background:var(--bg3);border-radius:var(--r-md);padding:10px;text-align:center"><div style="font-size:18px;font-weight:900;color:var(--text)">${allTimeKg||"–"}</div><div style="font-size:9.5px;color:var(--text3)">น้ำหนักสูงสุด</div></div>
    </div>`:""}
    ${hist.length>=2?`<button class="btn btn-ghost btn-block" id="el-graph-btn" style="margin-bottom:12px">📈 ดูกราฟความก้าวหน้า (${hist.length} ครั้ง)</button><div id="el-graph" style="display:none;margin-bottom:12px"></div>`:""}
    ${lastLine?`<div style="display:flex;align-items:center;gap:8px;background:var(--teal-bg);border-radius:var(--r-md);padding:9px 12px;margin-bottom:14px"><span style="font-size:15px">📈</span><span style="font-size:11px;color:var(--text2)">ครั้งก่อน: ${esc(lastLine)}</span></div>`:""}
    <div id="el-sets"></div>
    <button class="btn btn-ghost btn-block" id="el-addset" style="margin:4px 0 12px">➕ เพิ่มเซ็ต</button>
    <div style="margin-bottom:12px"><div class="flbl">โน้ต (ไม่บังคับ)</div><input id="el-notes" value="${esc(cur.notes??"")}" placeholder="เช่น รู้สึกหนัก เพิ่มได้อีก"></div>
    <button class="btn-save" id="el-save">บันทึก</button>
    ${cur.sets||cur.detail?`<button class="btn btn-ghost btn-block" id="el-clear" style="margin-top:8px">ลบบันทึกนี้</button>`:""}
  `);
  const gb=document.getElementById("el-graph-btn");
  if(gb)gb.onclick=()=>{
    const g=document.getElementById("el-graph");
    if(g.style.display==="none"){
      const fmtD=ds=>{const p=ds.split("-");return +p[2]+"/"+ +p[1];};
      g.innerHTML=`<div class="card" style="margin:0;padding:12px">
        <div style="font-size:11px;font-weight:700;color:var(--accent2);margin-bottom:6px">1RM ประเมิน (kg)</div>
        ${lineChart(hist.map(h=>({x:fmtD(h.date),y:h.oneRM})),{color:"var(--accent)"})}
        <div style="font-size:11px;font-weight:700;color:var(--teal);margin:10px 0 6px">Volume ต่อครั้ง (kg)</div>
        ${lineChart(hist.map(h=>({x:fmtD(h.date),y:h.volume})),{color:"var(--teal)"})}
      </div>`;
      g.style.display="block";gb.textContent="🔼 ซ่อนกราฟ";
    }else{g.style.display="none";gb.textContent="📈 ดูกราฟความก้าวหน้า ("+hist.length+" ครั้ง)";}
  };

  function renderSets(){
    const box=document.getElementById("el-sets");
    box.innerHTML=`
      <div style="display:flex;gap:8px;padding:0 6px 6px;font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px">
        <div style="width:34px">เซ็ต</div>
        <div style="flex:1;text-align:center">ครั้ง (reps)</div>
        <div style="flex:1;text-align:center">น้ำหนัก (kg)</div>
        <div style="width:34px"></div>
      </div>
      ${window._elSets.map((s,i)=>`
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
          <button class="el-check ${s.done?"on":""}" data-si="${i}" style="width:34px;height:38px;border-radius:10px;border:1.5px solid ${s.done?"var(--green)":"var(--border)"};background:${s.done?"var(--green-bg)":"var(--bg3)"};color:${s.done?"var(--green)":"var(--text3)"};font-weight:800;font-size:13px;cursor:pointer;flex-shrink:0">${s.done?"✓":"S"+(i+1)}</button>
          <input class="el-reps" data-si="${i}" type="number" inputmode="numeric" value="${s.reps??""}" placeholder="${targetReps}" style="flex:1;text-align:center;font-weight:700">
          <input class="el-kg" data-si="${i}" type="number" inputmode="decimal" value="${s.kg??""}" placeholder="0" style="flex:1;text-align:center;font-weight:700">
          <button class="el-del" data-si="${i}" style="width:34px;height:38px;border-radius:10px;border:none;background:var(--bg3);color:var(--text3);font-size:16px;cursor:pointer;flex-shrink:0">×</button>
        </div>`).join("")}`;
    box.querySelectorAll(".el-check").forEach(b=>b.onclick=()=>{const i=+b.dataset.si;window._elSets[i].done=!window._elSets[i].done;renderSets();});
    box.querySelectorAll(".el-reps").forEach(inp=>inp.oninput=()=>{window._elSets[+inp.dataset.si].reps=inp.value?+inp.value:null;});
    box.querySelectorAll(".el-kg").forEach(inp=>inp.oninput=()=>{window._elSets[+inp.dataset.si].kg=inp.value?+inp.value:null;});
    box.querySelectorAll(".el-del").forEach(b=>b.onclick=()=>{window._elSets.splice(+b.dataset.si,1);if(!window._elSets.length)window._elSets.push({reps:targetReps,kg:"",done:false});renderSets();});
  }
  renderSets();
  document.getElementById("close-el").onclick=closeSheet;
  document.getElementById("el-addset").onclick=()=>{const l=window._elSets[window._elSets.length-1];window._elSets.push({reps:l?.reps??targetReps,kg:l?.kg??"",done:false});renderSets();};
  document.getElementById("el-save").onclick=()=>{
    const sets=window._elSets.filter(s=>s.reps||s.kg);
    const notes=document.getElementById("el-notes").value.trim();
    const detail=sets.length?sets.map(s=>(s.kg||0)+"kg×"+(s.reps||0)).join(", "):"";
    const log=LS.get(K.exlog(state.date),{});
    log[ex.name]={sets,notes,detail};
    LS.set(K.exlog(state.date),log);
    let d=LS.get(K.workout(state.date),[]);if(!d.includes(ex.name)){d.push(ex.name);LS.set(K.workout(state.date),d);}
    // ตรวจ PR (สถิติใหม่)
    const pr=checkPR(ex.name,state.date);
    closeSheet();render();
    if(pr){
      const msgs=[];
      if(pr.newWeight)msgs.push("น้ำหนักสูงสุดใหม่ "+pr.newWeight+"kg");
      if(pr.new1RM)msgs.push("1RM ใหม่ "+pr.new1RM+"kg");
      prCelebrate(ex.name,msgs.join(" · "));
    }else{
      toast("✅ บันทึก "+sets.length+" เซ็ตแล้ว");
    }
  };
  const clr=document.getElementById("el-clear");
  if(clr)clr.onclick=()=>{const log=LS.get(K.exlog(state.date),{});delete log[ex.name];LS.set(K.exlog(state.date),log);closeSheet();render();};
}
